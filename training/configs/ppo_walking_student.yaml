version: "0.16.1"
version_name: "Student Handoff"
seed: 42

env:
  assets_root: assets/v2
  scene_xml_path: assets/v2/scene_flat_terrain.xml
  robot_config_path: assets/v2/mujoco_robot_config.json
  mjcf_path: assets/v2/wildrobot.xml
  model_path: assets/v2/scene_flat_terrain.xml

  sim_dt: 0.002
  ctrl_dt: 0.02
  max_episode_steps: 500

  target_height: 0.45
  min_height: 0.20
  max_height: 0.70
  max_pitch: 0.8
  max_roll: 0.8

  min_velocity: 0.05
  max_velocity: 0.15

  contact_threshold_force: 5.0
  foot_switch_threshold: 2.0
  action_filter_alpha: 0.3
  actor_obs_layout_id: wr_obs_v3
  clock_stride_period_steps: 36
  clock_phase_gate_width: 0.22
  teacher_enabled: false

  base_ctrl_enabled: false
  fsm_enabled: false
  push_enabled: false

ppo:
  num_envs: 1024
  rollout_steps: 128
  iterations: 40
  learning_rate: 3e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.15
  entropy_coef: 0.03
  value_loss_coef: 0.5
  epochs: 2
  num_minibatches: 32
  max_grad_norm: 0.5
  target_kl: 0.02
  log_interval: 10
  critic_privileged_enabled: false

  # v0.16.1 warm-start + early fine-tuning hooks
  pretrained_checkpoint_path: null
  teacher_regularization_checkpoint: null
  teacher_regularization_weight: 0.0
  teacher_regularization_decay: 1.0

  eval:
    enabled: true
    interval: 10
    num_envs: 128
    num_steps: 500
    deterministic: true

amp:
  enabled: false
  dataset_path: null
  weight: 0.0
  discriminator:
    learning_rate: 8e-5
    batch_size: 256
    updates_per_ppo_update: 2
    r1_gamma: 10.0
    input_noise_std: 0.03
  feature_config:
    use_finite_diff_vel: true
    use_estimated_contacts: true
    mask_waist: false
    enable_mirror_augmentation: false
  targets:
    disc_acc_min: 0.55
    disc_acc_max: 0.80

networks:
  actor:
    hidden_sizes: [256, 256, 128]
    activation: elu
    log_std_init: -1.0
    min_log_std: -5.0
    max_log_std: 2.0
  critic:
    hidden_sizes: [256, 256, 128]
    activation: elu
  discriminator:
    hidden_sizes: [512, 256]
    activation: relu

reward_weights:
  tracking_lin_vel: 8.0
  lateral_velocity: -0.3
  base_height: 0.03
  orientation: -0.7
  angular_velocity: -0.06
  pitch_rate: -0.4
  collapse_height: -0.3
  collapse_vz: -0.2
  torque: -0.0007
  saturation: -0.05
  action_rate: -0.005
  joint_velocity: -0.0003
  slip: -0.05
  clearance: 0.35
  gait_periodicity: 0.08
  hip_swing: 0.1
  knee_swing: 0.15
  hip_swing_min: 0.2
  knee_swing_min: 0.2
  flight_phase_penalty: -0.02
  stance_width_penalty: -0.1
  stance_width_target: 0.19
  stance_width_sigma: 0.05

  forward_velocity_scale: 6.0
  velocity_step_gate: 1.0
  velocity_standing_penalty: 0.5
  velocity_standing_threshold: 0.12
  velocity_cmd_min: 0.05

  step_event: 0.0005
  foot_place: 0.0
  step_length: 1.2
  step_length_target_base: 0.035
  step_length_target_scale: 0.15
  step_length_sigma: 0.06
  step_progress: 1.4
  step_progress_target_scale: 1.0
  step_progress_sigma: 0.05
  dense_progress: 0.0
  dense_progress_upright_pitch: 0.22
  dense_progress_upright_pitch_rate: 0.75
  dense_progress_upright_sharpness: 10.0
  forward_upright_gate_strength: 0.85
  cycle_progress: 0.1
  cycle_progress_target_scale: 0.6
  cycle_progress_sigma: 0.12
  propulsion_gate_step_length_weight: 0.55
  propulsion_gate_step_progress_weight: 0.45

reward:
  task_weight: 1.0
  amp_weight: 0.0
  task_reward_clip: null
  amp_reward_clip: [0.0, 1.0]

checkpoints:
  dir: training/checkpoints
  interval: 10

wandb:
  enabled: true
  project: wildrobot
  mode: offline
  tags: ["student", "v0.16.1"]
  log_frequency: 1
  log_dir: training/wandb

video:
  enabled: false
  num_videos: 1
  episode_length: 500
  render_every: 2
  width: 640
  height: 480
  fps: 25
  upload_to_wandb: false
  output_subdir: videos

