# =============================================================================
# WildRobot PPO Standing Config (v0.17.3a pitch-fix probe)
# =============================================================================
# Stage: Cheap sim-side follow-up to v0.17.3a before teacher escalation
#
# Keep the successful v0.17.3a recipe intact:
# 1. Home-centered action mapping (action=0 = standing home pose)
# 2. Relaxed termination (height-only, no orientation kill)
# 3. Large alive bonus (dominant survival signal)
#
# Add only small sim-side shaping changes aimed at hard-push failure:
# 4. Mild pitch-rate penalty to reduce uncontrolled pitch momentum
# 5. Mild pre-collapse shaping to penalize near-ground / downward states
#
# Deliberately unchanged from v0.17.3a:
# - min_height stays 0.15 (do not make the task itself harsher)
# - no teacher / no runtime hierarchy / no domain randomization
#
# Usage:
#   uv run python training/train.py --config training/configs/ppo_standing_v0173a_pitchfix.yaml
#   uv run python training/train.py --config training/configs/ppo_standing_v0173a_pitchfix.yaml --verify
# =============================================================================

version: "0.17.3a-pitchfix"
version_name: "Recipe Fix + Mild Pitch Arrest + Pre-Collapse Shaping"

seed: 42

# =============================================================================
# Environment
# =============================================================================
env:
  assets_root: assets/v2

  sim_dt: 0.002
  ctrl_dt: 0.02

  max_episode_steps: 500

  # v0.17.3a: Home-centered action mapping
  action_mapping_id: pos_target_home_v1

  # Health / termination
  target_height: 0.44
  height_target_two_sided: true
  use_relaxed_termination: true
  min_height: 0.15
  max_height: 0.70
  max_pitch: 0.8
  max_roll: 0.8

  # Commands - standing only
  min_velocity: 0.0
  max_velocity: 0.0

  # Contacts
  contact_threshold_force: 5.0
  foot_switch_threshold: 2.0

  # Action filtering — lower alpha since actions are now small residuals
  action_filter_alpha: 0.3

  # Actor observation layout
  actor_obs_layout_id: wr_obs_v2

  # Controllers disabled for pure PPO
  base_ctrl_enabled: false
  fsm_enabled: false

  # Push curriculum — same as v0.17.3a
  push_enabled: true
  push_start_step_min: 30
  push_start_step_max: 300
  push_duration_steps: 10
  push_force_min: 3.0
  push_force_max: 10.0
  push_bodies: [waist, upperbody]

  # v0.17.3b features — disabled for this sim-only probe
  domain_randomization_enabled: false
  action_delay_steps: 0

# =============================================================================
# PPO Algorithm
# =============================================================================
ppo:
  num_envs: 512
  rollout_steps: 256
  iterations: 300

  learning_rate: 1e-4
  gamma: 0.99
  gae_lambda: 0.95

  clip_epsilon: 0.15
  entropy_coef: 0.005
  value_loss_coef: 0.5

  epochs: 2
  num_minibatches: 32
  max_grad_norm: 0.5

  target_kl: 0.02

  eval:
    enabled: true
    interval: 25
    num_envs: 64
    num_steps: 500
    deterministic: true

  rollback:
    enabled: true
    patience: 2
    success_rate_drop_threshold: 0.05
    lr_factor: 0.5

  log_interval: 10

# =============================================================================
# AMP (disabled)
# =============================================================================
amp:
  enabled: false

# =============================================================================
# Reward weights — v0.17.3a pitch-fix probe
# =============================================================================
reward_weights:

  # Dominant survival signal
  alive: 15.0

  # Standing stability
  base_height: 0.5
  orientation: -1.0
  angular_velocity: -0.1
  pitch_rate: -0.2

  # Zero horizontal velocity for standing
  tracking_lin_vel: 0.1
  lateral_velocity: -0.5

  # Height target
  height_target: 0.5
  height_target_sigma: 0.05

  # Mild pre-collapse shaping without changing termination threshold
  collapse_height: -0.05
  collapse_vz: -0.1

  # Quality terms
  torque: -0.001
  saturation: -0.1
  action_rate: -0.01
  joint_velocity: -0.001
  slip: -0.5

  # Posture return after disturbance
  posture: 0.5
  posture_sigma: 0.40
  posture_gate_pitch: 0.35
  posture_gate_roll: 0.35

  # Stepping auxiliaries
  step_event: 0.12
  foot_place: 0.30
  foot_place_sigma: 0.14
  foot_place_k_lat_vel: 0.15
  foot_place_k_roll: 0.10
  foot_place_k_pitch: 0.05
  foot_place_k_fwd_vel: 0.05
  step_need_pitch: 0.35
  step_need_roll: 0.35
  step_need_lat_vel: 0.30
  step_need_pitch_rate: 1.00

  # Walking baggage zeroed
  step_length: 0.0
  step_progress: 0.0
  dense_progress: 0.0
  cycle_progress: 0.0
  velocity_step_gate: 0.0

  # Related walking parameters
  step_length_target_base: 0.03
  step_length_target_scale: 0.25
  step_length_sigma: 0.04
  step_progress_target_scale: 1.0
  step_progress_sigma: 0.05
  dense_progress_upright_pitch: 0.25
  dense_progress_upright_pitch_rate: 0.90
  dense_progress_upright_sharpness: 10.0
  forward_upright_gate_strength: 1.0
  cycle_progress_target_scale: 1.0
  cycle_progress_sigma: 0.08
  propulsion_gate_step_length_weight: 0.5
  propulsion_gate_step_progress_weight: 0.5

  # Stance geometry
  stance_width_target: 0.23
  forward_velocity_scale: 4.0

# =============================================================================
# Quick Verify (Smoke Test)
# =============================================================================
quick_verify:
  ppo:
    num_envs: 8
    rollout_steps: 64
    iterations: 1
