# =============================================================================
# WildRobot PPO Walking Config (v0.15.4)
# =============================================================================
# Stage 1b: Robot-Native Walking Policy (No AMP, no reference motion)
#
# Goal: Learn a stable, repeatable, controllable gait using PPO task rewards
# only. This config tightens the task signal after `v0.15.3` mostly learned
# survival with weak forward motion and rising pitch failures.
#
# Usage:
#   uv run python training/train.py --config training/configs/ppo_walking.yaml
# Start this run from scratch. Do not resume from the standing checkpoint.
# =============================================================================

version: "0.15.4"
version_name: "Stage 1b walking reward rebalance for velocity and pitch stability"

seed: 42

# =============================================================================
# Environment
# =============================================================================
env:
  assets_root: assets/v2

  sim_dt: 0.002
  ctrl_dt: 0.02

  max_episode_steps: 500

  # Health / termination
  target_height: 0.45
  min_height: 0.20
  collapse_height_buffer: 0.02
  collapse_height_sigma: 0.03
  collapse_vz_gate_band: 0.05
  max_height: 0.70
  max_pitch: 0.8
  max_roll: 0.8

  # Walking commands
  min_velocity: 0.1
  max_velocity: 0.45

  # Contacts
  contact_threshold_force: 5.0
  foot_switch_threshold: 2.0

  # Lower action lag for faster pitch correction and easier gait emergence.
  action_filter_alpha: 0.2
  actor_obs_layout_id: wr_obs_v1

  # Controllers off for Stage 1 walking.
  base_ctrl_enabled: false
  fsm_enabled: false

  # Disturbance pushes remain off until the robot has a usable nominal gait.
  push_enabled: false
  push_start_step_min: 40
  push_start_step_max: 250
  push_duration_steps: 6
  push_force_min: 1.0
  push_force_max: 3.0
  push_body: waist

# =============================================================================
# PPO Algorithm
# =============================================================================
ppo:
  # Standard walking batch geometry; no longer tied to the standing checkpoint.
  num_envs: 1024
  rollout_steps: 128
  iterations: 300

  learning_rate: 3e-4
  gamma: 0.99
  gae_lambda: 0.95

  clip_epsilon: 0.15
  entropy_coef: 0.01
  value_loss_coef: 0.5

  epochs: 2
  num_minibatches: 32
  max_grad_norm: 0.5

  target_kl: 0.02
  kl_early_stop_multiplier: 1.5
  kl_lr_backoff_multiplier: 3.0
  kl_lr_backoff_factor: 0.5
  lr_schedule_end_factor: 0.5
  entropy_schedule_end_factor: 0.4
  critic_privileged_enabled: false

  eval:
    enabled: true
    interval: 10
    num_envs: 128
    num_steps: 500
    deterministic: true

  rollback:
    enabled: false
    patience: 2
    success_rate_drop_threshold: 0.05
    lr_factor: 0.5

  log_interval: 10

# =============================================================================
# AMP (disabled for Stage 1)
# =============================================================================
amp:
  enabled: false

  dataset_path: null
  weight: 0.0

  discriminator:
    learning_rate: 8e-5
    batch_size: 256
    updates_per_ppo_update: 2
    r1_gamma: 10.0
    input_noise_std: 0.03

  feature_config:
    use_finite_diff_vel: true
    use_estimated_contacts: true
    mask_waist: false
    enable_mirror_augmentation: false

  targets:
    disc_acc_min: 0.55
    disc_acc_max: 0.80

# =============================================================================
# Networks
# =============================================================================
networks:
  actor:
    hidden_sizes: [256, 256, 128]
    activation: elu
    log_std_init: -1.0
    min_log_std: -5.0
    max_log_std: 2.0

  critic:
    hidden_sizes: [256, 256, 128]
    activation: elu

  discriminator:
    hidden_sizes: [512, 256]
    activation: relu

# =============================================================================
# Task Reward Weights
# =============================================================================
reward_weights:
  # v0.15.4: pay clearly more for matching commanded forward speed and less
  # for simply remaining alive while leaning into a posture exploit.
  tracking_lin_vel: 10.0
  lateral_velocity: -0.3
  # Note: this term multiplies `healthy` in env reward, so keep it very low.
  base_height: 0.03
  orientation: -0.8
  angular_velocity: -0.12
  height_target: 0.2
  height_target_sigma: 0.05
  collapse_height: -0.4
  collapse_vz: -0.3

  torque: -0.0012
  saturation: -0.1

  action_rate: -0.005
  joint_velocity: -0.0003

  slip: -0.15
  clearance: 0.2
  gait_periodicity: 0.15
  hip_swing: 0.1
  knee_swing: 0.15
  hip_swing_min: 0.2
  knee_swing_min: 0.2
  flight_phase_penalty: -0.02
  stance_width_penalty: -0.1
  stance_width_target: 0.19
  stance_width_sigma: 0.05

  forward_velocity_scale: 8.0
  velocity_standing_penalty: 0.8
  velocity_standing_threshold: 0.18
  velocity_cmd_min: 0.1

# =============================================================================
# Reward Composition
# =============================================================================
reward:
  task_weight: 1.0
  amp_weight: 0.0
  task_reward_clip: null
  amp_reward_clip: [0.0, 1.0]

# =============================================================================
# Checkpoints
# =============================================================================
checkpoints:
  dir: training/checkpoints
  interval: 25

# =============================================================================
# Logging
# =============================================================================
wandb:
  enabled: true
  project: wildrobot-ppo
  mode: offline
  tags: [ppo, stage1, walking, v0.15.4]

video:
  enabled: true
  episode_length: 500
  width: 640
  height: 480
  fps: 25

# =============================================================================
# Quick Verify
# =============================================================================
quick_verify:
  enabled: false
  ppo:
    num_envs: 4
    rollout_steps: 8
    iterations: 3
  amp:
    enabled: false
