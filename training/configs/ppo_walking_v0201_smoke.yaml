# =============================================================================
# WildRobot v0.20.1 PPO Smoke Config
# =============================================================================
# Single-command (vx=0.15) imitation-residual smoke per
# training/docs/walking_training.md (v0.20.1 section).
#
# Reward family: DeepMimic-style imitation-dominant residual reward
# (Task #49).  Term weights follow the DeepMimic 2018 baseline ratio
# (pose 0.65 / pose-orient 0.10 / end-effector 0.15 / contact 0.10)
# adapted for the WildRobot v3 prior, plus a separate task block on
# forward-velocity tracking and standard regularizers.  See:
#   - Peng et al. 2018 "DeepMimic" eq. 9
#   - toddlerbot/locomotion/walk.gin (canonical ToddlerBot weights)
#   - mujoco_playground g1 joystick (tracking_sigma=0.25 form)
#   - loco-mujoco MimicReward (numerator-α form)
#
# Compute budget: M2 cap ≈ 20M env steps (1024 envs × 128 rollout_steps
# × 150 iterations = 1.97e7 policy decisions).  An earlier revision
# of walking_training.md mis-stated this as 5M; the 150-iter cap is the
# authoritative budget.
#
# Usage:
#   uv run python training/train.py \
#     --config training/configs/ppo_walking_v0201_smoke.yaml --verify
#
# See also:
#   - training/docs/v0201_env_wiring.md        env design (§3-§5)
#   - training/docs/v0201_env_rewrite_audit.md rewrite audit (§A.E)
#   - training/docs/walking_training.md        v0.20.1 smoke contract
# =============================================================================
version: "0.20.1"
version_name: "v0.20.1 PPO smoke (vx=0.15, imitation residual)"

seed: 42

# =============================================================================
# Environment — v3 offline reference + bounded residual policy
# =============================================================================
env:
  assets_root: assets/v2
  scene_xml_path: assets/v2/scene_flat_terrain.xml
  robot_config_path: assets/v2/mujoco_robot_config.json

  sim_dt: 0.002
  ctrl_dt: 0.02

  # Episode horizon must satisfy `horizon <= service.n_steps` per the
  # RuntimeReferenceService end-of-trajectory clamp contract.  The vx=0.15
  # ZMP trajectory is ~1100 steps at dt=0.02; 500 steps = 10 s is well
  # under the trajectory's ~22 s.
  max_episode_steps: 500

  # Health / termination
  target_height: 0.45
  min_height: 0.30
  max_height: 0.70
  max_pitch: 0.8
  max_roll: 0.8
  use_relaxed_termination: false

  # Single-command smoke: both ends pinned at vx=0.15 so reset samples
  # a degenerate uniform.  Multi-command training is deferred (per
  # design note Q3 / smoke_contract).
  min_velocity: 0.15
  max_velocity: 0.15

  # Contacts
  contact_threshold_force: 5.0
  foot_switch_threshold: 2.0

  # Action filtering — alpha=0.0 keeps the smoke baseline clean (no
  # filter dynamics), but with the v0.20.1 residual-only filter
  # contract (env applies lowpass_v1 to the policy residual command,
  # not to the composed q_target) ANY alpha value satisfies G6: when
  # the policy outputs zero, the filtered residual stays zero, so
  # target_q == q_ref exactly.  See tests/test_v0201_env_zero_action.py
  # test_zero_action_residual_metric_stays_zero_for_50_steps for the
  # invariant.  alpha can be lifted to v0.20.2's hardware-realism
  # value without re-checking G6.
  action_filter_alpha: 0.0

  # ---- v0.20.1 v3 offline reference + v6 obs (proprio history) ----
  # v6 = v5 channels + a flat 3-frame past-proprio stack
  # (joint_pos + joint_vel + gyro + foot_switches + prev_action) so the
  # actor can estimate base velocity from short-horizon kinematics.
  # ToddlerBot uses c_frame_stack=15; 3 is the minimum that gives finite-
  # diff velocity from joint pos and one integration of gyro.  v5 -> v6
  # is a strict superset; checkpoints from v5 cannot be loaded into v6.
  loc_ref_version: v3_offline_library
  actor_obs_layout_id: wr_obs_v6_offline_ref_history

  # Build the library on the fly via ZMPWalkGenerator (omit
  # loc_ref_offline_library_path).  The smoke uses a single command bin.
  loc_ref_offline_command_vx: 0.15

  # ---- Residual bounds (G1) ----
  # Absolute mode: residual_delta_q = clip(action) * scale (rad).  The
  # per-joint map matches the G1 spec in the design note (§4.1):
  # legs ±0.50 rad; arms / waist fall back to the scalar ±0.20 rad.
  loc_ref_residual_mode: absolute
  loc_ref_residual_scale: 0.20
  loc_ref_residual_scale_per_joint:
    left_hip_pitch: 0.50
    right_hip_pitch: 0.50
    left_hip_roll: 0.50
    right_hip_roll: 0.50
    left_knee_pitch: 0.50
    right_knee_pitch: 0.50
    left_ankle_pitch: 0.50
    right_ankle_pitch: 0.50

  # Disturbance pushes — disabled for the smoke per walking_training.md.
  # The push_schedule plumbing is preserved in env state regardless;
  # leaving push_enabled false simply gates the apply path off.
  push_enabled: false

  # IMU noise / latency disabled for the first smoke (focus on imitation
  # tracking; defer realism profile to a later milestone).
  imu_gyro_noise_std: 0.0
  imu_quat_noise_deg: 0.0
  imu_latency_steps: 0

  # Domain randomization disabled for the first smoke.
  domain_randomization_enabled: false

  # No action delay for the first smoke.
  action_delay_steps: 0

# =============================================================================
# PPO — sized to the M2 ~20M env-step compute budget
# =============================================================================
# 1024 envs * 128 rollout * 150 iter = 1.97e7 policy decisions
# (each policy decision = one ctrl_dt = n_substeps physics steps;
# the env-step count for M2 is the policy-decision count, not the
# inner physics-step count).
ppo:
  num_envs: 1024
  rollout_steps: 128
  iterations: 150

  # Learning rate / entropy match the ToddlerBot walk.gin defaults
  # (3e-4 / 0.01) which are the standard PPO-locomotion starting point
  # in the recent humanoid literature.
  learning_rate: 3e-4
  gamma: 0.99
  gae_lambda: 0.95

  clip_epsilon: 0.2
  entropy_coef: 0.01
  value_loss_coef: 0.5

  epochs: 4
  num_minibatches: 32
  max_grad_norm: 0.5

  log_interval: 10

# =============================================================================
# AMP — disabled for v0.20.1 smoke (not on the smoke critical path)
# =============================================================================
amp:
  enabled: false
  dataset_path: null
  weight: 0.0

# =============================================================================
# Networks
# =============================================================================
networks:
  actor:
    hidden_sizes: [256, 256, 128]
    activation: elu
    log_std_init: -1.0
    min_log_std: -5.0
    max_log_std: 2.0
  critic:
    hidden_sizes: [256, 256, 128]
    activation: elu

# =============================================================================
# Reward Weights — v0.20.1 imitation-dominant residual family
# =============================================================================
# Imitation block (sums to 1.0 per the DeepMimic 2018 baseline ratio):
#   pose / pose-orientation / end-effector / contact = 0.65 / 0.10 / 0.15 / 0.10
# Task block (separate; mujoco_playground convention): cmd_forward_velocity_track.
# Regularizers: ToddlerBot walk.gin scales (action_rate -0.01, torque -0.001,
# joint_vel -0.0005).  Alive is small + survives termination (the ref/* terms
# already saturate near 1 when imitating well, so a large alive would dwarf
# the imitation gradient).
#
# Sigmas/alphas use the dataclass defaults (training_runtime_config.py:
# RewardWeightsConfig v0.20.1 block) — pinned here only when overriding.
reward_weights:
  alive: 0.05
  ref_q_track: 0.65
  ref_body_quat_track: 0.10
  ref_feet_pos_track: 0.15
  ref_contact_match: 0.10
  cmd_forward_velocity_track: 0.30
  action_rate: -0.01
  torque: -0.001
  joint_velocity: -0.0005
  # M1 fail-mode hooks (walking_training.md v0.20.1 §, M1 decision tree).
  # Default 0 for the smoke; the M1 "balance issue" branch turns these on
  # from the YAML alone — env wiring is already in place so no code edit
  # is needed mid-debug.  Raw penalty values are always logged at
  # ``reward/penalty_slip_raw`` / ``reward/penalty_pitch_rate_raw`` so the
  # weight can be sized from baseline before promoting either.
  slip: 0.0
  pitch_rate: 0.0

# =============================================================================
# Reward Composition
# =============================================================================
reward:
  task_weight: 1.0
  amp_weight: 0.0
  task_reward_clip: null

# =============================================================================
# Checkpoints
# =============================================================================
checkpoints:
  dir: training/checkpoints
  interval: 10

# =============================================================================
# Logging — offline mode by default for the stub; flip to online for real runs
# =============================================================================
wandb:
  enabled: true
  project: wildrobot-ppo
  mode: offline
  tags: [ppo, v0.20.1, smoke, imitation_residual]

video:
  enabled: false

# =============================================================================
# Quick verify
# =============================================================================
quick_verify:
  enabled: false
  ppo:
    num_envs: 4
    rollout_steps: 8
    iterations: 3
  amp:
    enabled: false
