# =============================================================================
# WildRobot v0.20.1 PPO Smoke 14 — combined 0.26-range + critic obs x15 run
# =============================================================================
# Smoke14 = smoke13_026 + critic obs temporal stacking + 1D velocity
# reward.  Three TB-parity-adjacent fixes layered on top of the
# failed smoke13:
#
#   1. Velocity-reward fix + WR-scaled 0.26 m/s command range
#      (inherited from smoke13_026 / commits c803e12 + 0e0a048):
#        - In-code reward target switched from selected-reference
#          pelvis velocity to COMMANDED velocity (TB
#          _reward_lin_vel_xy parity).
#        - Forward command range [0.18, 0.26] m/s; 5-bin
#          cmd-conditioned grid {0.18, 0.20, 0.22, 0.24, 0.26}.
#        - Compute extended to 30M env-steps.
#
#   2. Critic obs temporal stacking x15
#      (this branch's new code, commit bf7c439):
#        - env.critic_obs_history_frames: 15 (TB c_frame_stack
#          parity; mjx_env.py:698 + 2166-2171).
#        - critic obs grows from 52 to 780; the value MLP receives
#          the trailing 15 frames flattened.  Any single-step
#          discontinuity from a cmd-bin crossing (motor_pos_error,
#          ref_stance) dilutes to 1/15 of the stacked vector.
#
#   3. cmd_velocity_track_dim: 1 (smoke14 delta vs smoke13_026)
#        - Reverts the velocity reward from TB-parity 2D form
#          (penalizing both vx and vy against (cmd_vx, 0)) to the
#          legacy scalar-vx form (penalizing only vx).
#        - WR has no lateral command, so dim=2 is effectively a
#          standing-against-natural-sway penalty.  Dim=1 keeps the
#          velocity reward focused on the forward objective while
#          we evaluate the critic-stacking change at 0.26 m/s.
#        - ``cmd_velocity_xy_err`` and ``ref_velocity_xy_err``
#          are still logged as diagnostics.
#
# Rationale for combining instead of running smoke14 alone as a
# critic-stacking isolation: the 0.26 + velocity-reward fix is the
# load-bearing change for the TB comparison sequence.  Running smoke14
# without the 0.26 range would only confirm critic stacking helps at
# the original failed operating point, but would not advance the TB
# comparison.  We accept the attribution cost (smoke14 deltas vs
# smoke13_026 are 2-D: critic stacking + dim=1) to keep the 30M run
# focused on the combined hypothesis.
#
# Backout plan if smoke14 doesn't recover smoke12b stability:
#   - Drop critic_obs_history_frames: 15 and flip dim back to 2
#     → equivalent to smoke13_026 in isolation.
#   - Drop the cmd range / velocity-reward changes back to smoke13
#     defaults → equivalent to the critic-stacking-only smoke14
#     described in /tmp/smoke14_critic_obs_stacking_prompt.md.
#   - Flip dim back to 2 only → isolates the dim=1 effect.
#
# Compute budget: 750 iters * 2048 envs * 20 rollout_steps =
# 30,720,000 env-steps (≈30.7M).  Matches smoke13_026.
#
# Per /tmp/smoke14_critic_obs_stacking_prompt.md +
# /tmp/smoke13_tb_velocity_reward_fix_prompt.md.
# =============================================================================
version: "0.20.1"
version_name: "v0.20.1 PPO smoke14 (smoke13_026 + critic stack x15 + dim=1 vel, 30M)"

seed: 42

env:
  assets_root: assets/v2
  scene_xml_path: assets/v2/scene_flat_terrain.xml
  robot_config_path: assets/v2/mujoco_robot_config.json

  sim_dt: 0.002
  ctrl_dt: 0.02

  max_episode_steps: 500

  target_height: 0.45
  min_height: 0.30
  max_height: 0.70
  max_pitch: 0.8
  max_roll: 0.8
  use_relaxed_termination: true
  torso_pitch_soft_min_rad: -0.2
  torso_pitch_soft_max_rad: 0.2
  torso_roll_soft_min_rad: -0.1
  torso_roll_soft_max_rad: 0.1
  min_feet_y_dist: 0.171
  max_feet_y_dist: 0.317

  reset_torso_roll_range: [-0.1, 0.1]
  reset_torso_pitch_range: [-0.1, 0.1]

  penalty_pose_weight_default: 0.0
  penalty_pose_weights_per_joint:
    left_hip_pitch: 0.01
    right_hip_pitch: 0.01
    left_hip_roll: 1.0
    right_hip_roll: 1.0
    left_knee_pitch: 0.01
    right_knee_pitch: 0.01
    left_ankle_pitch: 5.0
    right_ankle_pitch: 5.0
    left_ankle_roll: 5.0
    right_ankle_roll: 5.0

  # Forward command range identical to smoke13_026: WR-scaled 0.26
  # m/s target ≈ TB's 0.20 m/s scaled by WR's 4/3 leg-length ratio.
  # Effective vx grid (arange + offline union):
  #   {0.18, 0.20, 0.22, 0.24, 0.26}
  min_velocity: 0.18
  max_velocity: 0.26
  cmd_resample_steps: 150
  cmd_zero_chance: 0.0
  cmd_turn_chance: 0.0
  cmd_deadzone: 0.0666666667
  eval_velocity_cmd: 0.26

  contact_threshold_force: 1.0
  foot_switch_threshold: 2.0

  action_filter_alpha: 0.0

  loc_ref_version: v3_offline_library
  actor_obs_layout_id: wr_obs_v7_phase_proprio
  # Eval cmd anchor / single-bin fallback target.  Unioned into the
  # cmd-conditioned grid so eval snaps to its own bin exactly.
  loc_ref_offline_command_vx: 0.26

  loc_ref_residual_base: home
  loc_ref_reset_base: home
  loc_ref_penalty_pose_anchor: home
  loc_ref_penalty_ang_vel_xy_form: tb_neg_squared
  loc_ref_penalty_feet_ori_form: tb_linear_lateral
  loc_ref_feet_phase_zero_on_standing: true
  close_feet_threshold: 0.146

  critic_imitation_refs: true

  # =========================================================================
  # smoke14 delta — TB-style critic obs temporal stacking.
  #
  # Mirrors ToddlerBot's ``c_frame_stack=15`` (mjx_config.py:84).  The
  # env always carries the full 15-frame buffer; this knob controls
  # how many frames the critic actually sees on its obs vector each
  # step.  Default for all pre-smoke14 configs is 1 (single-frame,
  # byte-equal to pre-smoke14 behavior).
  #
  # Effect on the value head input: critic_obs_dim grows from
  # PRIVILEGED_OBS_DIM (52) under depth=1 to 15 * 52 = 780 under
  # depth=15.  The training_loop reads this multiplier when sizing
  # the value MLP, so no other config knob changes.
  # =========================================================================
  critic_obs_history_frames: 15

  loc_ref_command_conditioned: true
  loc_ref_command_grid_interval: 0.02

  loc_ref_residual_mode: absolute
  loc_ref_residual_scale: 0.2
  loc_ref_residual_scale_per_joint:
    left_hip_pitch: 0.3534
    left_hip_roll: 0.25
    left_knee_pitch: 0.667
    left_ankle_pitch: 0.25
    left_ankle_roll: 0.25
    right_hip_pitch: 0.3867
    right_hip_roll: 0.25
    right_knee_pitch: 0.6657
    right_ankle_pitch: 0.25
    right_ankle_roll: 0.25

  push_enabled: false
  imu_gyro_noise_std: 0.05
  imu_quat_noise_deg: 2.0
  imu_latency_steps: 0
  domain_randomization_enabled: true
  domain_rand_friction_range: [0.4, 1.0]
  domain_rand_mass_scale_range: [0.9, 1.1]
  domain_rand_kp_scale_range: [0.9, 1.1]
  domain_rand_frictionloss_scale_range: [0.8, 1.2]
  domain_rand_joint_offset_rad: 0.03
  domain_rand_backlash_range: [0.02, 0.10]
  domain_rand_backlash_activation: 0.1

  action_delay_steps: 1

ppo:
  num_envs: 2048
  rollout_steps: 20
  # 30M run: 750 * 2048 * 20 = 30,720,000 env-steps (≈30.7M).
  # Matches smoke13_026 so the smoke14 vs smoke13_026 comparison is
  # at equal compute (the only delta is critic stacking).
  iterations: 750

  learning_rate: 3.0e-5
  gamma: 0.97
  gae_lambda: 0.95

  clip_epsilon: 0.2
  entropy_coef: 5.0e-4
  value_loss_coef: 0.5

  epochs: 4
  num_minibatches: 16
  max_grad_norm: 1.0

  log_interval: 10
  critic_privileged_enabled: true

  eval:
    enabled: false
    interval: 10
    num_envs: 64
    num_steps: 500
    deterministic: true
    seed_offset: 10000
    post_training_enabled: true
    post_training_top_k: 3
    post_training_num_envs: 8
    post_training_num_steps: 500
    post_training_checkpoint_label: eval_promoted

networks:
  actor:
    hidden_sizes: [512, 256, 128]
    activation: elu
    log_std_init: -0.693
    min_log_std: -5.0
    max_log_std: 2.0
  critic:
    hidden_sizes: [512, 256, 128]
    activation: elu

reward_weights:
  alive: 1.0
  cmd_forward_velocity_track: 2.0
  cmd_forward_velocity_alpha: 562.5
  # smoke14 — 1D scalar-vx velocity tracking (NOT the 2D TB form
  # used in smoke13 / smoke13_026).  Reward becomes
  #   exp(-alpha * (vx_actual - velocity_cmd)^2)
  # ignoring lateral velocity entirely.  Rationale: WR has no
  # lateral command (vy_cmd ≡ 0), so the dim=2 path effectively
  # penalizes any vy whatsoever — including the natural sway of a
  # bipedal gait — adding bootstrap pressure that's orthogonal to
  # the forward-tracking objective.  Dim=1 keeps the reward signal
  # narrower while we evaluate the critic-stacking change.
  # ``cmd_velocity_xy_err`` is still logged as a diagnostic.
  cmd_velocity_track_dim: 1
  ref_body_quat_track: 2.5
  ang_vel_xy: 1.0
  action_rate: -2.0
  penalty_pose: -0.5
  penalty_close_feet_xy: 10.0
  feet_phase: 7.5
  feet_phase_alpha: 914.304
  feet_phase_swing_height: 0.05
  penalty_feet_ori: 5.0

  ref_q_track: 0.0
  ref_contact_match: 0.0
  ref_feet_z_track: 0.0
  ref_feet_z_track_alpha: 1428.6
  torso_pos_xy: 0.0
  torso_pos_xy_alpha: 90.0
  lin_vel_z: 0.0
  feet_air_time: 0.0
  feet_clearance: 0.0
  feet_distance: 0.0
  torso_pitch_soft: 0.0
  torso_roll_soft: 0.0
  torque: 0.0
  joint_velocity: 0.0
  slip: 0.0
  pitch_rate: 0.0

reward:
  task_weight: 1.0
  task_reward_clip: null

checkpoints:
  dir: training/checkpoints
  interval: 10

wandb:
  enabled: true
  project: wildrobot-ppo
  mode: offline
  tags: [ppo, v0.20.1, smoke14, home_anchored_residual, tb_active_rewards, smoke12b_authority, cmd_conditioned_reference, vel_track_dim1, cmd_range_018_026, critic_obs_stacked_15]

video:
  enabled: false

quick_verify:
  enabled: false
  ppo:
    num_envs: 4
    rollout_steps: 8
    iterations: 3
    eval:
      enabled: true
      interval: 1
      num_envs: 4
      num_steps: 16
      deterministic: true
      seed_offset: 10000
