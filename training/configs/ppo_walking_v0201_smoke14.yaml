# =============================================================================
# WildRobot v0.20.1 PPO Smoke 14 — smoke13 + critic obs temporal stacking
# =============================================================================
# Isolation experiment: smoke13's only known regression vs smoke12b was
# that the cmd-conditioned reference lookup added a single-step
# discontinuity to the privileged critic's
# ``motor_pos_error = q_actual - q_ref(t, cmd_bin)`` and
# ``ref_stance = win["contact_mask"]`` channels.  At every per-episode
# ``velocity_cmd`` resample that crossed a bin boundary (4-bin grid
# [0.08, 0.10, 0.12, 0.1333] at the smoke13 interval=0.02; ~34% of
# resamples cross under cmd_resample_steps=150), the critic obs
# jumped without any corresponding actor / physics change, polluting
# the value baseline and biasing PPO updates.  Run
# ``offline-run-20260522_210536-4p73cif2`` failed accordingly:
# height-low collapse at 100%, ep_len 54, vx -0.45 m/s at iter 480
# while same-compute smoke12b reaches ep_len 458 and vx ≈ 0.
#
# ToddlerBot has the SAME potential discontinuity in its critic obs
# (toddlerbot/locomotion/mjx_env.py:2126,2150,2154 — same
# ``motor_pos_error`` + ``stance_mask``), but absorbs it by stacking
# the privileged obs across ``c_frame_stack=15`` frames
# (mjx_env.py:698 + 2166-2171).  WildRobot copied the actor stacking
# (``PROPRIO_HISTORY_FRAMES = 15`` in env_info.py:73) but NOT the
# critic stacking — PRIVILEGED_OBS_DIM was single-frame width.
#
# Smoke14 = smoke13 yaml verbatim + ``env.critic_obs_history_frames:
# 15`` (the only delta).  No reward / actor / residual / PPO knob
# changes — this isolates the critic-stacking hypothesis so the run
# can be read cleanly against smoke13.  If smoke14 recovers
# smoke12b's stability the discontinuity-dilution theory is
# confirmed; if not we know to keep digging elsewhere.
#
# Compute budget: same as smoke13 (480 * 2048 * 20 ≈ 19.7M env-steps)
# so smoke13 → smoke14 is an A/B at matched compute.
#
# Architectural decision — critic_obs_history_frames=15:
#   The env always carries the full PRIVILEGED_OBS_HISTORY_FRAMES=15
#   buffer regardless of the configured depth (uniform pytree shape
#   across configs).  Setting the field to 15 exposes all of those
#   frames flattened into the 780-dim critic obs vector that the
#   value head consumes (`training/algos/ppo/ppo_core.py`
#   ``create_networks`` already takes critic_obs_dim).  The legacy
#   default ``1`` is byte-equal to pre-smoke14 behavior for
#   smoke7..smoke13 configs.
#
# Per /tmp/smoke14_critic_obs_stacking_prompt.md.
# =============================================================================
version: "0.20.1"
version_name: "v0.20.1 PPO smoke14 (smoke13 + critic obs stacked x15)"

seed: 42

env:
  assets_root: assets/v2
  scene_xml_path: assets/v2/scene_flat_terrain.xml
  robot_config_path: assets/v2/mujoco_robot_config.json

  sim_dt: 0.002
  ctrl_dt: 0.02

  max_episode_steps: 500

  target_height: 0.45
  min_height: 0.30
  max_height: 0.70
  max_pitch: 0.8
  max_roll: 0.8
  use_relaxed_termination: true
  torso_pitch_soft_min_rad: -0.2
  torso_pitch_soft_max_rad: 0.2
  torso_roll_soft_min_rad: -0.1
  torso_roll_soft_max_rad: 0.1
  min_feet_y_dist: 0.171
  max_feet_y_dist: 0.317

  reset_torso_roll_range: [-0.1, 0.1]
  reset_torso_pitch_range: [-0.1, 0.1]

  penalty_pose_weight_default: 0.0
  penalty_pose_weights_per_joint:
    left_hip_pitch: 0.01
    right_hip_pitch: 0.01
    left_hip_roll: 1.0
    right_hip_roll: 1.0
    left_knee_pitch: 0.01
    right_knee_pitch: 0.01
    left_ankle_pitch: 5.0
    right_ankle_pitch: 5.0
    left_ankle_roll: 5.0
    right_ankle_roll: 5.0

  # Forward-only command range identical to smoke13.
  min_velocity: 0.08
  max_velocity: 0.1333333333
  cmd_resample_steps: 150
  cmd_zero_chance: 0.0
  cmd_turn_chance: 0.0
  cmd_deadzone: 0.0666666667
  eval_velocity_cmd: 0.1333333333

  contact_threshold_force: 1.0
  foot_switch_threshold: 2.0

  action_filter_alpha: 0.0

  loc_ref_version: v3_offline_library
  actor_obs_layout_id: wr_obs_v7_phase_proprio
  loc_ref_offline_command_vx: 0.1333333333

  loc_ref_residual_base: home
  loc_ref_reset_base: home
  loc_ref_penalty_pose_anchor: home
  loc_ref_penalty_ang_vel_xy_form: tb_neg_squared
  loc_ref_penalty_feet_ori_form: tb_linear_lateral
  loc_ref_feet_phase_zero_on_standing: true
  close_feet_threshold: 0.146

  critic_imitation_refs: true

  # =========================================================================
  # smoke14 delta — TB-style critic obs temporal stacking.
  #
  # Mirrors ToddlerBot's ``c_frame_stack=15`` (mjx_config.py:84).  The
  # env always carries the full 15-frame buffer; this knob controls
  # how many frames the critic actually sees on its obs vector each
  # step.  Default for all pre-smoke14 configs is 1 (single-frame,
  # byte-equal to pre-smoke14 behavior).
  #
  # Effect on the value head input: critic_obs_dim grows from
  # PRIVILEGED_OBS_DIM (52) under depth=1 to 15 * 52 = 780 under
  # depth=15.  The training_loop reads this multiplier when sizing
  # the value MLP, so no other config knob changes.
  # =========================================================================
  critic_obs_history_frames: 15

  loc_ref_command_conditioned: true
  loc_ref_command_grid_interval: 0.02

  loc_ref_residual_mode: absolute
  loc_ref_residual_scale: 0.2
  loc_ref_residual_scale_per_joint:
    left_hip_pitch: 0.3534
    left_hip_roll: 0.25
    left_knee_pitch: 0.667
    left_ankle_pitch: 0.25
    left_ankle_roll: 0.25
    right_hip_pitch: 0.3867
    right_hip_roll: 0.25
    right_knee_pitch: 0.6657
    right_ankle_pitch: 0.25
    right_ankle_roll: 0.25

  push_enabled: false
  imu_gyro_noise_std: 0.05
  imu_quat_noise_deg: 2.0
  imu_latency_steps: 0
  domain_randomization_enabled: true
  domain_rand_friction_range: [0.4, 1.0]
  domain_rand_mass_scale_range: [0.9, 1.1]
  domain_rand_kp_scale_range: [0.9, 1.1]
  domain_rand_frictionloss_scale_range: [0.8, 1.2]
  domain_rand_joint_offset_rad: 0.03
  domain_rand_backlash_range: [0.02, 0.10]
  domain_rand_backlash_activation: 0.1

  action_delay_steps: 1

ppo:
  num_envs: 2048
  rollout_steps: 20
  iterations: 480

  learning_rate: 3.0e-5
  gamma: 0.97
  gae_lambda: 0.95

  clip_epsilon: 0.2
  entropy_coef: 5.0e-4
  value_loss_coef: 0.5

  epochs: 4
  num_minibatches: 16
  max_grad_norm: 1.0

  log_interval: 10
  critic_privileged_enabled: true

  eval:
    enabled: false
    interval: 10
    num_envs: 64
    num_steps: 500
    deterministic: true
    seed_offset: 10000
    post_training_enabled: true
    post_training_top_k: 3
    post_training_num_envs: 8
    post_training_num_steps: 500
    post_training_checkpoint_label: eval_promoted

networks:
  actor:
    hidden_sizes: [512, 256, 128]
    activation: elu
    log_std_init: -0.693
    min_log_std: -5.0
    max_log_std: 2.0
  critic:
    hidden_sizes: [512, 256, 128]
    activation: elu

reward_weights:
  alive: 1.0
  cmd_forward_velocity_track: 2.0
  cmd_forward_velocity_alpha: 562.5
  cmd_velocity_track_dim: 2
  ref_body_quat_track: 2.5
  ang_vel_xy: 1.0
  action_rate: -2.0
  penalty_pose: -0.5
  penalty_close_feet_xy: 10.0
  feet_phase: 7.5
  feet_phase_alpha: 914.304
  feet_phase_swing_height: 0.05
  penalty_feet_ori: 5.0

  ref_q_track: 0.0
  ref_contact_match: 0.0
  ref_feet_z_track: 0.0
  ref_feet_z_track_alpha: 1428.6
  torso_pos_xy: 0.0
  torso_pos_xy_alpha: 90.0
  lin_vel_z: 0.0
  feet_air_time: 0.0
  feet_clearance: 0.0
  feet_distance: 0.0
  torso_pitch_soft: 0.0
  torso_roll_soft: 0.0
  torque: 0.0
  joint_velocity: 0.0
  slip: 0.0
  pitch_rate: 0.0

reward:
  task_weight: 1.0
  task_reward_clip: null

checkpoints:
  dir: training/checkpoints
  interval: 10

wandb:
  enabled: true
  project: wildrobot-ppo
  mode: offline
  tags: [ppo, v0.20.1, smoke14, home_anchored_residual, tb_active_rewards, smoke12b_authority, cmd_conditioned_reference, vel_track_dim2, critic_obs_stacked_15]

video:
  enabled: false

quick_verify:
  enabled: false
  ppo:
    num_envs: 4
    rollout_steps: 8
    iterations: 3
    eval:
      enabled: true
      interval: 1
      num_envs: 4
      num_steps: 16
      deterministic: true
      seed_offset: 10000
