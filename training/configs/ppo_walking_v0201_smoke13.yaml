# =============================================================================
# WildRobot v0.20.1 PPO Smoke 13 — home-anchored residual walking
# =============================================================================
# Simplification of smoke12b toward single-base control.  Same env /
# action contract family as smoke12b but pruned to one canonical
# locomotion-ready anchor (`home`) with narrower per-joint scales
# and the imitation/hybrid reward terms held off.  No new runtime
# mode or anchor selector is introduced.
#
# Architectural decisions (delta vs smoke12b):
#
#   loc_ref_residual_base: home (unchanged from smoke12b)
#     target_q = clip(home_q + clip(action) * scale, joint_range).
#     This is the only action anchor in smoke13.  Mirrors TB's
#     active locomotion contract (toddlerbot/locomotion/mjx_env.py
#     :1543-1546: action_target = default_action + action_scale *
#     delayed_action) modulo the WR-specific per-joint scale map
#     below.
#
#   loc_ref_residual_scale: smoke12b authority (RESTORED)
#     Earlier smoke13 drafts narrowed knees to 0.5 / hip-pitch to
#     0.35 and produced a failed run (height-low collapse +
#     back-drive in offline-run-20260521_221534-29exm4g5).  Smoke12b
#     was the first branch that broke the standing basin and
#     visually walked, so smoke13 reverts the per-joint scale map
#     to smoke12b values exactly (scalar 0.2 + knees 0.667/0.6657 +
#     hip_pitch 0.353/0.387) and tests the command-conditioned
#     reference + 2D tracking change in isolation.
#
#   loc_ref_command_conditioned: true (TB parity)
#     Builds a small reference library spanning the command range
#     [min_velocity, max_velocity] (plus loc_ref_offline_command_vx
#     if distinct) and selects the nearest-vx bin per episode
#     using the sampled velocity_cmd.  Mirrors TB's
#     motion_ref.get_state_ref(time, command, ...) pattern
#     (~/projects/toddlerbot/toddlerbot/locomotion/mjx_env.py).
#     The fixed-bin behavior is preserved as default for older
#     configs (loc_ref_command_conditioned defaults to false).
#
#   cmd_velocity_track_dim: 2 (TB-style 2D velocity tracking)
#     Under dim=2 + command-conditioned, the velocity reward
#     compares actual (vx, vy) in heading-local frame to the
#     SELECTED reference's pelvis_vel[:2] rather than to
#     (velocity_cmd, 0).  Matches TB walk_env reward at
#     mjx_env.py:2342-2346.  Forward-only commands and yaw=0
#     prior mean the reference's world pelvis_vel ≈ heading-local
#     velocity, so frames align.  Dim=1 path is unchanged and
#     still legacy: exp(-alpha * (vx - cmd_vx)^2) ignoring vy.
#
#   Reward stack: TB-active block ONLY (weights byte-equal to smoke12b)
#     The smoke12b reward weights are already a clean copy of TB
#     walk.gin:110-131.  Smoke13 keeps them byte-equal and explicitly
#     zeros out every hybrid imitation term so a future change
#     doesn't silently re-enable one.
#
#   Observation: wr_obs_v7_phase_proprio (unchanged)
#     v7 carries phase(2) + proprio_history(1050) on top of the v3
#     base (gravity + gyro + jpos + jvel + foot_switches +
#     prev_action + velocity_cmd).  No offline-reference window
#     channels in the actor stream.
#
#   Reset: home-anchored, with three layered perturbations
#     loc_ref_reset_base: home is inherited from smoke12b.  The reset
#     composition under that base (training env reset) is:
#       (a) per-joint uniform noise in [-0.05, +0.05] rad on every
#           controlled joint  — WR-specific, retained for sim2real
#           robustness;
#       (b) domain-randomization joint offsets sampled per-env from
#           ``env.domain_rand_joint_offset_rad`` — also WR-specific;
#       (c) TB-style torso pose perturbation: uniform roll/pitch in
#           ``reset_torso_{roll,pitch}_range = [-0.1, 0.1]`` rad,
#           partitioned across hip / knee / ankle pitch and composed
#           into the root quat.  This row matches TB
#           DomainRandConfig.torso_{pitch,roll}_range
#           (mjx_config.py:211-212); the other two rows are kept on
#           top of it.
#     The native-MuJoCo eval adapter (V6EvalAdapter) mirrors all
#     three rows (a), (b), and (c) so visual / native-MuJoCo eval
#     rollouts see the same per-episode reset distribution training
#     does.  Each can be opted out at the adapter call site
#     (apply_noise=False suppresses (a) and (b); apply_dr=False
#     suppresses (b); perturb_pose=False suppresses (c) — used by
#     env.reset_for_eval mirroring tests).
#
#   Critic: privileged enabled, TB-parity legacy imitation refs
#     critic_imitation_refs: true keeps the legacy critic obs
#     channels (motor_pos_error = q_actual - nominal_q_ref(t),
#     ref_stance = win["contact_mask"]).  Smoke13's actor remains
#     clean — the privileged critic is allowed to see the ZMP
#     reference because TB does the equivalent in walk.gin:25-28.
#     If a future branch wants a fully imitation-free critic, flip
#     the env knob to false.
#
#   No `action_mode` runtime selector.  Earlier smoke13 drafts
#     introduced an ``action_mode: direct`` flag that hard-anchored
#     the action path on home regardless of ``loc_ref_residual_base``;
#     that proved redundant once we accepted that smoke13 always
#     sets ``loc_ref_residual_base: home``.  The single
#     ``loc_ref_residual_base`` selector now carries the contract.
#
# Compute: matched to smoke12b's bootstrap budget (480 iters * 2048 envs *
# 20 rollout_steps ≈ 19.7M env-steps) so smoke13 is a same-compute
# A/B against smoke12b — answers "does TB-style command-conditioned
# reference + 2D velocity tracking bootstrap walking better than
# smoke12b's fixed-reference 1D tracking, given the same residual
# authority and reward stack?"  TB-aligned PPO hyperparams
# (lr=3e-5, entropy 5e-4) kept identical to smoke12b.
#
# Bootstrap scope (unchanged from smoke12b):
#   - forward-only cmd range [0.08, 0.1333] m/s
#   - cmd_zero_chance: 0.0 (every episode demands forward motion)
#   - eval_velocity_cmd: 0.1333 (top of training range)
#   - no yaw/turn/backward (deferred to a future config)
# =============================================================================
version: "0.20.1"
version_name: "v0.20.1 PPO smoke13 (home-anchored residual walking)"

seed: 42

env:
  assets_root: assets/v2
  scene_xml_path: assets/v2/scene_flat_terrain.xml
  robot_config_path: assets/v2/mujoco_robot_config.json

  sim_dt: 0.002
  ctrl_dt: 0.02

  max_episode_steps: 500

  target_height: 0.45
  min_height: 0.30
  max_height: 0.70
  max_pitch: 0.8
  max_roll: 0.8
  use_relaxed_termination: true
  torso_pitch_soft_min_rad: -0.2
  torso_pitch_soft_max_rad: 0.2
  torso_roll_soft_min_rad: -0.1
  torso_roll_soft_max_rad: 0.1
  min_feet_y_dist: 0.171
  max_feet_y_dist: 0.317

  # TB-style torso pose perturbation (inherited from smoke12b).  Mirrors
  # TB DomainRandConfig.torso_{pitch,roll}_range [-0.1, 0.1] rad
  # (mjx_config.py:211-212).  This is ONE of three reset perturbations
  # applied under loc_ref_reset_base=home (see header for the full
  # composition: per-joint noise + DR offsets + this torso rotation).
  # The native-MuJoCo eval adapter mirrors this row for visual parity.
  reset_torso_roll_range: [-0.1, 0.1]
  reset_torso_pitch_range: [-0.1, 0.1]

  # TB-active penalty_pose per-joint weights (mirrors
  # walk.gin:120-124 layout).  Anchored to home (see
  # loc_ref_penalty_pose_anchor below).
  penalty_pose_weight_default: 0.0
  penalty_pose_weights_per_joint:
    left_hip_pitch: 0.01
    right_hip_pitch: 0.01
    left_hip_roll: 1.0
    right_hip_roll: 1.0
    left_knee_pitch: 0.01
    right_knee_pitch: 0.01
    left_ankle_pitch: 5.0
    right_ankle_pitch: 5.0
    left_ankle_roll: 5.0
    right_ankle_roll: 5.0

  # Forward-only command range (smoke12b fix retained).
  min_velocity: 0.08
  max_velocity: 0.1333333333
  cmd_resample_steps: 150
  cmd_zero_chance: 0.0
  cmd_turn_chance: 0.0
  cmd_deadzone: 0.0666666667
  eval_velocity_cmd: 0.1333333333

  contact_threshold_force: 1.0
  foot_switch_threshold: 2.0

  action_filter_alpha: 0.0

  loc_ref_version: v3_offline_library
  # Clean actor observation: phase + proprio + proprio_history only
  # (v3 base + 2 + 1050).  No offline-reference window channels in
  # the actor stream.  Pin even though it's the v0.20.1 default so a
  # future default flip doesn't silently leak hybrid channels.
  actor_obs_layout_id: wr_obs_v7_phase_proprio
  # Offline reference command used to derive the gait clock
  # (win["phase_sin"]) consumed by feet_phase and the actor's
  # phase obs slot, and to populate the privileged critic's
  # nominal_q_ref + contact_mask channels.  Actor obs has no
  # imitation pull from this trajectory; action path is anchored
  # on home, not on q_ref(t).
  loc_ref_offline_command_vx: 0.1333333333

  # =========================================================================
  # Action contract (home-anchored residual)
  # =========================================================================
  # Single canonical anchor for action composition.  The env's
  # _compose_target_q_from_residual computes
  #     target_q = clip(home_q + clip(action) * scale_per_joint, joint_range)
  # when loc_ref_residual_base == "home".  No runtime mode switch.
  loc_ref_residual_base: home
  loc_ref_reset_base: home
  loc_ref_penalty_pose_anchor: home
  loc_ref_penalty_ang_vel_xy_form: tb_neg_squared
  loc_ref_penalty_feet_ori_form: tb_linear_lateral
  # Standing branch under cmd_zero_chance=0 is unreachable; gate
  # is set for safety so any future cmd_zero re-enable doesn't
  # silently re-pay feet_phase for standing still.
  loc_ref_feet_phase_zero_on_standing: true
  close_feet_threshold: 0.146

  # TB-parity privileged critic: ``motor_pos_error = q_actual -
  # nominal_q_ref(t)`` and ``ref_stance = win["contact_mask"]``
  # (mirrors TB walk.gin:25-28 critic payload).  Actor remains
  # clean (wr_obs_v7_phase_proprio carries no offline-reference
  # window channels); privileged critic is allowed to see the ZMP
  # reference because TB does the equivalent.
  critic_imitation_refs: true

  # Command-conditioned reference lookup (TB parity).  When true,
  # the env builds a small reference library spanning the command
  # range [min_velocity, max_velocity] (plus
  # loc_ref_offline_command_vx if distinct) and selects the
  # nearest-vx bin per episode using the sampled velocity_cmd.
  # This is what TB does via motion_ref.get_state_ref(time,
  # command, ...) — the prior's pelvis velocity follows the
  # sampled command, so dim=2 cmd_forward_velocity_track can
  # compare actual (vx, vy) to a meaningful reference instead of
  # always comparing against the fixed 0.1333 m/s trajectory.
  # Default false in older configs preserves the legacy
  # single-bin behavior; smoke13 sets true.
  loc_ref_command_conditioned: true
  # TB-default grid spacing (toddlerbot/algorithms/zmp_walk.py:88
  # interval=0.05).  At smoke13's narrow range [0.08, 0.1333] this
  # gives {0.08, 0.13} from np.arange, unioned with
  # loc_ref_offline_command_vx=0.1333 so the eval cmd hits its own
  # bin exactly → final vx_grid {0.08, 0.13, 0.1333}.  Densify by
  # lowering this value (e.g. 0.025) if mid-range cmd snapping
  # (cmd=0.10 → 0.08) turns out to bias training.
  loc_ref_command_grid_interval: 0.05

  # Restored to smoke12b residual scales exactly.  Earlier smoke13
  # drafts narrowed knees to 0.5 / hip-pitch to 0.35 and produced
  # a failed run (height-low collapse + backward drive in
  # offline-run-20260521_221534-29exm4g5).  Smoke12b was the first
  # branch that broke the standing basin and visually walked, so
  # smoke13 now keeps that authority and tests the
  # command-conditioned reference + 2D tracking change in
  # isolation.  Per-joint values generated by
  # ``assets/derive_residual_scales.py --coverage 0.75``;
  # re-run after regenerating the prior or home keyframe.
  loc_ref_residual_mode: absolute
  loc_ref_residual_scale: 0.2
  loc_ref_residual_scale_per_joint:
    left_hip_pitch: 0.3534
    left_hip_roll: 0.25
    left_knee_pitch: 0.667
    left_ankle_pitch: 0.25
    left_ankle_roll: 0.25
    right_hip_pitch: 0.3867
    right_hip_roll: 0.25
    right_knee_pitch: 0.6657
    right_ankle_pitch: 0.25
    right_ankle_roll: 0.25

  push_enabled: false
  imu_gyro_noise_std: 0.05
  imu_quat_noise_deg: 2.0
  imu_latency_steps: 0
  domain_randomization_enabled: true
  domain_rand_friction_range: [0.4, 1.0]
  domain_rand_mass_scale_range: [0.9, 1.1]
  domain_rand_kp_scale_range: [0.9, 1.1]
  domain_rand_frictionloss_scale_range: [0.8, 1.2]
  domain_rand_joint_offset_rad: 0.03
  domain_rand_backlash_range: [0.02, 0.10]
  domain_rand_backlash_activation: 0.1

  action_delay_steps: 1

ppo:
  num_envs: 2048
  rollout_steps: 20
  iterations: 480

  learning_rate: 3.0e-5
  gamma: 0.97
  gae_lambda: 0.95

  clip_epsilon: 0.2
  entropy_coef: 5.0e-4
  value_loss_coef: 0.5

  epochs: 4
  num_minibatches: 16
  max_grad_norm: 1.0

  log_interval: 10
  critic_privileged_enabled: true

  eval:
    enabled: false
    interval: 10
    num_envs: 64
    num_steps: 500
    deterministic: true
    seed_offset: 10000
    post_training_enabled: true
    post_training_top_k: 3
    post_training_num_envs: 8
    post_training_num_steps: 500
    post_training_checkpoint_label: eval_promoted

networks:
  actor:
    hidden_sizes: [512, 256, 128]
    activation: elu
    log_std_init: -0.693
    min_log_std: -5.0
    max_log_std: 2.0
  critic:
    hidden_sizes: [512, 256, 128]
    activation: elu

# =============================================================================
# Reward Weights — TB-active locomotion block only
# Each retained term mirrors a specific TB-active row in walk.gin:110-131.
# Each disabled term lists the rationale.
# =============================================================================
reward_weights:
  # ---- TB-active block (walk.gin:110-131) ----
  alive: 1.0                                # walk.gin:127
  # walk.gin:111 (lin_vel_xy): smoke13 tracks heading-local (vx, vy)
  # against (cmd_vx, 0). Command sampling remains forward-only in this smoke.
  cmd_forward_velocity_track: 2.0
  # alpha_wr = alpha_tb / s^2 = 1000 / (4/3)^2 = 562.5; preserves the
  # normalized tracking basin under WR's 4/3 size scaling.
  cmd_forward_velocity_alpha: 562.5
  # smoke13 uses TB-style 2D local velocity tracking with vy_ref=0 to
  # target lateral-drift failure without adding lateral/yaw commands.
  cmd_velocity_track_dim: 2
  ref_body_quat_track: 2.5                  # walk.gin:117 (torso_quat;
                                            # WR impl is upright-angle
                                            # vs identity, not an
                                            # imitation reference)
  ang_vel_xy: 1.0                           # walk.gin:115 (penalty_ang_vel_xy)
  # TB walk.gin:119 sets penalty_action_rate=2.0 (positive in TB's
  # neg-MSE convention).  WR's sign convention is negative; -2.0 ==
  # TB +2.0 in magnitude.  Smoke12b halved this to -1.0 during the
  # residual-branch basin-break; smoke13 reverts to the TB-faithful
  # -2.0 because the simpler home-anchored scale recipe (narrower
  # per-joint cap) is the smoothness knob, not action_rate.
  action_rate: -2.0
  penalty_pose: -0.5                        # walk.gin:120
  penalty_close_feet_xy: 10.0               # walk.gin:126
  feet_phase: 7.5                           # walk.gin:128
  # alpha_wr = 1428.6 * (0.04 / 0.05)^2 = 914.304; preserves the
  # dimensionless Gaussian basin (alpha * swing_height^2 = 2.286)
  # under WR's 0.05 m prior-aligned swing target.
  feet_phase_alpha: 914.304
  feet_phase_swing_height: 0.05
  penalty_feet_ori: 5.0                     # walk.gin:129

  # ---- Hybrid / imitation reward terms — explicitly disabled ----
  # These are not in TB's active block (walk.gin:110-131) — they
  # come from the WR-specific imitation-residual architecture or
  # from TB's commented-out ZMP variant (walk.gin:55-108).  Held at
  # zero here so a future config rewrite cannot silently re-enable
  # one without an explicit rationale comment.
  ref_q_track: 0.0                          # joint-imitation; TB-active drops
  ref_contact_match: 0.0                    # boolean contact-imitation
  ref_feet_z_track: 0.0                     # foot-z imitation
  ref_feet_z_track_alpha: 1428.6            # held; weight=0 disables
  torso_pos_xy: 0.0                         # torso-XY imitation
  torso_pos_xy_alpha: 90.0                  # held; weight=0 disables
  lin_vel_z: 0.0                            # vertical-bobbing imitation
  feet_air_time: 0.0                        # sparse; replaced by feet_phase
  feet_clearance: 0.0                       # sparse; replaced by feet_phase
  feet_distance: 0.0                        # superseded by penalty_close_feet_xy
  torso_pitch_soft: 0.0                     # superseded by penalty_ang_vel_xy
  torso_roll_soft: 0.0                      # superseded by penalty_ang_vel_xy
  torque: 0.0                               # not in TB-active
  joint_velocity: 0.0                       # not in TB-active
  slip: 0.0                                 # not in TB-active
  pitch_rate: 0.0                           # M1 diagnostic hook only

reward:
  task_weight: 1.0
  task_reward_clip: null

checkpoints:
  dir: training/checkpoints
  interval: 10

wandb:
  enabled: true
  project: wildrobot-ppo
  mode: offline
  tags: [ppo, v0.20.1, smoke13, home_anchored_residual, tb_active_rewards, smoke12b_authority, cmd_conditioned_reference, vel_track_dim2]

video:
  enabled: false

quick_verify:
  enabled: false
  ppo:
    num_envs: 4
    rollout_steps: 8
    iterations: 3
    eval:
      enabled: true
      interval: 1
      num_envs: 4
      num_steps: 16
      deterministic: true
      seed_offset: 10000
