# =============================================================================
# WildRobot PPO Standing Config (v0.17.1)
# =============================================================================
# Stage: Recipe baseline at the boundary - boundary-focused push curriculum
#
# Goal: Beat the old v0.14.6 pure-PPO baseline (60.84% at 10N x 10) using
# the cleaned standing recipe with explicit boundary-focused curriculum.
#
# Recipe A: legged_gym / Rudin for RL implementation
# Recipe B: Li et al. 2024 Cassie for biped behavior/escalation
#
# Main question: Can the cleaned standing recipe beat the old v0.14.6 baseline?
#
# Target exit criteria:
#   - eval_easy > 95%  (5N x 10)
#   - eval_medium > 75% (8N x 10)  
#   - eval_hard > 60% (10N x 10) - beat v0.14.6 baseline
#   - term_height_low_frac below old baseline
#
# Usage:
#   uv run python training/train.py --config training/configs/ppo_standing_v0171.yaml
#
# Total steps = iterations × num_envs × rollout_steps
# =============================================================================

version: "0.17.1"
version_name: "Recipe Baseline at the Boundary"

seed: 42

# =============================================================================
# Environment
# =============================================================================
env:
  assets_root: assets/v2

  sim_dt: 0.002
  ctrl_dt: 0.02

  max_episode_steps: 500

  # Health / termination - keep proven standing defaults
  target_height: 0.44
  # Encourage exploring a lower stance by rewarding height near target_height
  height_target_two_sided: true
  min_height: 0.40
  collapse_height_buffer: 0.03
  collapse_height_sigma: 0.03
  collapse_vz_gate_band: 0.07
  max_height: 0.70
  max_pitch: 0.8
  max_roll: 0.8

  # Commands - standing only (zero velocity command)
  min_velocity: 0.0
  max_velocity: 0.0

  # Contacts
  contact_threshold_force: 5.0
  foot_switch_threshold: 2.0

  # Action filtering
  action_filter_alpha: 0.6
  
  # Actor observation layout - ensure contact-aware signals included
  actor_obs_layout_id: wr_obs_v2

  # M2: Base controller DISABLED for pure PPO standing approach
  base_ctrl_enabled: false

  # M3: FSM DISABLED for pure PPO standing approach  
  fsm_enabled: false

  # v0.17.1 BOUNDARY-FOCUSED CURRICULUM:
  # Stage-based progression through the known bracing boundary
  # Known empirical boundary: 8N manageable, 9N transition, 10N hard-push regime
  
  # CURRICULUM STAGE CONFIGURATION
  # Stage 1: Easy pushes (3-7N) - ankle/hip strategy quality
  # Stage 2: Boundary pushes (7-10N) - first reliable recovery steps  
  # Stage 3: Hard pushes (10N fixed) - exceed old baseline
  
  # v0.17.1: Start with curriculum encompassing the full boundary
  # Train across easy->boundary->hard with hard evals present from start
  push_enabled: true
  push_start_step_min: 30
  push_start_step_max: 300
  push_duration_steps: 10
  
  # Curriculum forces: span easy to hard boundary
  # Easy: 3-7N, Medium: 7-10N, Hard: focus on 10N
  push_force_min: 3.0  # Start easier for curriculum progression
  push_force_max: 10.0  # Encompass full boundary to hard regime
  push_bodies: [waist, upperbody]

# =============================================================================
# PPO Algorithm (task learning)
# =============================================================================
ppo:

  num_envs: 512
  rollout_steps: 256 
  iterations: 300  # Extended for boundary-focused curriculum progression

  # Stabilized PPO updates
  learning_rate: 1e-4
  gamma: 0.99
  gae_lambda: 0.95

  # Conservative PPO trust region for stability
  clip_epsilon: 0.15
  entropy_coef: 0.005
  value_loss_coef: 0.5

  epochs: 2
  num_minibatches: 32
  max_grad_norm: 0.5

  # Stability guardrails
  target_kl: 0.02

  # v0.17.1: Fixed evaluation ladder present from start
  # Checkpoint selection driven by push evals, especially eval_hard  
  eval:
    enabled: true
    interval: 25  # Evaluate every 25 iterations
    num_envs: 64   # Sufficient for stable eval metrics
    num_steps: 500 # Full episode length for recovery assessment
    deterministic: true

  rollback:
    enabled: true
    patience: 2
    success_rate_drop_threshold: 0.05
    lr_factor: 0.5

  log_interval: 10

# =============================================================================
# Reward weights - standing-focused, conservative
# =============================================================================
reward_weights:

  # Core standing stability
  base_height: 1.0
  orientation: -2.0  # NEGATIVE - penalty for bad orientation
  angular_velocity: -0.1

  # Zero horizontal velocity for standing
  tracking_lin_vel: 0.1  # Keep small for zero-velocity standing
  lateral_velocity: -0.5

  # Quality terms
  torque: -0.001
  saturation: -0.1
  action_rate: -0.01
  joint_velocity: -0.001
  slip: -1.0

  # Posture return after disturbance
  posture: 0.3
  posture_sigma: 0.40
  posture_gate_pitch: 0.35
  posture_gate_roll: 0.35

  # Core collapse prevention (keep from proven standing stack)
  collapse_height: -1.0  # NEGATIVE - penalty for approaching collapse
  collapse_vz: -0.5      # NEGATIVE - penalty for downward velocity
  collapse_height_sigma: 0.03

  # MILD NEED-GATED STEPPING AUXILIARIES - kept as bootstrap signals
  # v0.17.1: Conservative weights, need-gated, no walking reward creep
  step_event: 0.12        # In 0.10-0.15 range per standing_training.md
  foot_place: 0.30        # In 0.25-0.35 range per standing_training.md
  foot_place_sigma: 0.14
  foot_place_k_lat_vel: 0.15
  foot_place_k_roll: 0.10
  foot_place_k_pitch: 0.05
  foot_place_k_fwd_vel: 0.05
  step_need_pitch: 0.35
  step_need_roll: 0.35
  step_need_lat_vel: 0.30
  step_need_pitch_rate: 1.00

  # WALKING BAGGAGE EXPLICITLY ZEROED - for config self-containment
  # v0.17.1: These terms remain disabled for standing-reset branch
  step_length: 0.0                        # Structured step length rewards
  step_progress: 0.0                      # Touchdown-to-touchdown forward displacement
  dense_progress: 0.0                     # Dense forward progress shaping
  cycle_progress: 0.0                     # Gait-clock-dependent cycle completion
  velocity_step_gate: 0.0                 # Forward reward gating based on stepping quality
  
  # Related walking parameters (explicitly set for clarity)
  step_length_target_base: 0.03
  step_length_target_scale: 0.25
  step_length_sigma: 0.04
  step_progress_target_scale: 1.0
  step_progress_sigma: 0.05
  dense_progress_upright_pitch: 0.25
  dense_progress_upright_pitch_rate: 0.90
  dense_progress_upright_sharpness: 10.0
  forward_upright_gate_strength: 1.0
  cycle_progress_target_scale: 1.0
  cycle_progress_sigma: 0.08
  propulsion_gate_step_length_weight: 0.5
  propulsion_gate_step_progress_weight: 0.5

  # Stance geometry (kept for foot placement quality, not walking)
  stance_width_target: 0.23
  forward_velocity_scale: 4.0