# =============================================================================
# WildRobot PPO Walking Config (v0.19.4-C)
# =============================================================================
# v0.19.4-C: Reference propulsion rework — conservative incremental
# Strategy: keep linear COM mode (stable), increase one lever at a time
# - Lever 1: increase COM trajectory bounds (0.03 → 0.05m ahead)
# - Lever 2: modest pelvis pitch feedforward (0.015 → 0.03)
# - Lever 3: longer step time (0.50 → 0.60s) for better tracking
# - Lever 4: ankle push-off DISABLED initially (enable after L1-L3 stable)
# - Lever 5: support_release_phase_start lowered (0.25 → 0.20)
#
# LIPM mode is available but NOT default — the exponential cosh/sinh
# amplifies pitch oscillation and creates a positive feedback loop.
# Use only after linear mode meets the forward velocity gate.
# =============================================================================

version: "0.19.4c"
version_name: "Reference propulsion rework — support gate fix + COM coupling"

seed: 42

env:
  assets_root: assets/v2
  realism_profile_path: assets/v2/realism_profile_v0.19.1.json

  sim_dt: 0.002
  ctrl_dt: 0.02
  max_episode_steps: 500

  target_height: 0.45
  min_height: 0.20
  collapse_height_buffer: 0.02
  collapse_height_sigma: 0.03
  collapse_vz_gate_band: 0.05
  max_height: 0.70
  max_pitch: 0.8
  max_roll: 0.8

  # Forward walking only — no stop command (reference does not support stop)
  min_velocity: 0.08
  max_velocity: 0.15

  contact_threshold_force: 5.0
  foot_switch_threshold: 2.0

  action_filter_alpha: 0.3
  actor_obs_layout_id: wr_obs_v4
  action_mapping_id: pos_target_home_v1
  loc_ref_enabled: true
  loc_ref_version: v2
  loc_ref_residual_scale: 0.10

  # ── v0.19.4-C propulsion changes (conservative incremental) ─────────
  # Step time: 0.50 → 0.60 (Lever 3: more time for servo to track)
  loc_ref_step_time_s: 0.60
  loc_ref_walking_pelvis_height_m: 0.42
  loc_ref_nominal_lateral_foot_offset_m: 0.08
  loc_ref_min_step_length_m: 0.03
  loc_ref_max_step_length_m: 0.12
  loc_ref_max_lateral_step_m: 0.10
  loc_ref_swing_height_m: 0.025
  # Pelvis roll: 0.02 → 0.06 rad (~3.4°) for lateral weight shift
  # Without ankle roll, pelvis roll + hip roll are the only frontal-plane
  # authority for single-support balance.
  loc_ref_pelvis_roll_bias_rad: 0.06
  # Pelvis pitch feedforward: 0.015 → 0.03 (Lever 2: modest increase)
  loc_ref_pelvis_pitch_gain: 0.03
  # Max pelvis pitch: 0.02 → 0.04 rad (~2.3°)
  loc_ref_max_pelvis_pitch_rad: 0.04
  loc_ref_dcm_placement_gain: 0.10
  loc_ref_swing_target_blend: 1.0
  loc_ref_stance_height_blend: 0.0
  loc_ref_support_margin_m: 0.020
  loc_ref_walking_crouch_extra_m: 0.045
  loc_ref_max_swing_x_delta_m: 0.06
  loc_ref_max_swing_z_delta_m: 0.03
  # Hip roll lateral coupling: 0.08 → 0.12 (moderate COM shift, avoid narrowing stance)
  loc_ref_swing_y_to_hip_roll: 0.12
  loc_ref_overspeed_deadband: 0.02
  loc_ref_overspeed_brake_gain: 3.0
  loc_ref_overspeed_phase_slowdown_gain: 5.0
  loc_ref_overspeed_phase_min_scale: 0.15
  loc_ref_pitch_brake_start_rad: 0.08
  loc_ref_pitch_brake_gain: 2.5
  loc_ref_swing_x_brake_pitch_start_rad: 0.30
  loc_ref_swing_x_brake_overspeed_deadband: 0.05
  loc_ref_swing_x_brake_gain: 2.0
  loc_ref_swing_x_min_scale: 0.00
  loc_ref_pelvis_pitch_brake_gain: 2.0
  loc_ref_pelvis_pitch_min_scale: 0.00
  loc_ref_support_pitch_rate_start_rad_s: 0.60
  # Reduced from 10.0 — high gain collapses health under mild instability
  loc_ref_support_health_gain: 5.0
  # Support release phase: 0.25 → 0.20 (Lever 5: more swing time)
  loc_ref_support_release_phase_start: 0.20
  # Raised min scales so the robot always takes a visible step
  loc_ref_support_foothold_min_scale: 0.30
  loc_ref_support_swing_progress_min_scale: 0.10
  loc_ref_support_phase_min_scale: 0.15
  loc_ref_max_lateral_release_m: 0.015
  loc_ref_v2_support_open_threshold: 0.50
  loc_ref_v2_support_release_threshold: 0.30
  loc_ref_v2_touchdown_phase_min: 0.55
  loc_ref_v2_capture_hold_s: 0.04
  loc_ref_v2_settle_hold_s: 0.04
  loc_ref_v2_support_stabilize_max_foothold_scale: 0.70
  loc_ref_v2_post_settle_swing_scale: 0.15
  loc_ref_v2_startup_realization_lead_alpha: 0.25
  loc_ref_v2_startup_handoff_min_pelvis_realization: 0.60
  loc_ref_v2_startup_target_rate_design_rad_s: 0.5235987756   # 30 deg/s
  loc_ref_v2_startup_target_rate_hard_cap_rad_s: 1.7453292520 # 100 deg/s
  loc_ref_v2_startup_route_w1_alpha: 0.25
  loc_ref_v2_startup_route_w2_alpha: 0.50
  loc_ref_v2_startup_route_w3_alpha: 0.75
  loc_ref_v2_startup_route_w1_scale: 0.20
  loc_ref_v2_startup_route_w2_scale: 0.45
  loc_ref_v2_startup_route_w3_scale: 0.75
  loc_ref_v2_startup_route_w1_support_y_scale: 0.30
  loc_ref_v2_startup_route_w2_support_y_scale: 0.65
  loc_ref_v2_startup_route_w3_support_y_scale: 0.90
  loc_ref_v2_startup_route_w1_pelvis_roll_scale: 0.50
  loc_ref_v2_startup_route_w2_pelvis_roll_scale: 0.80
  loc_ref_v2_startup_route_w3_pelvis_roll_scale: 0.95
  loc_ref_v2_startup_route_w1_pelvis_pitch_scale: 0.20
  loc_ref_v2_startup_route_w2_pelvis_pitch_scale: 0.50
  loc_ref_v2_startup_route_w3_pelvis_pitch_scale: 0.80
  loc_ref_v2_startup_route_w1_pelvis_height_scale: 0.15
  loc_ref_v2_startup_route_w2_pelvis_height_scale: 0.45
  loc_ref_v2_startup_route_w3_pelvis_height_scale: 0.80
  loc_ref_v2_startup_route_w2_min_pelvis_realization: 0.30
  loc_ref_v2_startup_route_w3_min_pelvis_realization: 0.55
  loc_ref_v2_startup_route_w2_pitch_relax: 1.25
  loc_ref_v2_startup_route_w2_pitch_rate_relax: 1.25
  loc_ref_v2_support_entry_shaping_window_s: 0.12
  loc_ref_v2_support_pelvis_height_offset_m: 0.00
  start_from_support_posture: true

  # ── COM trajectory: linear mode with increased bounds (Lever 1) ─────
  com_trajectory_enabled: true
  com_trajectory_mode: linear
  com_trajectory_max_behind_m: 0.02
  com_trajectory_max_ahead_m: 0.05

  # ── Ankle push-off: DISABLED initially (Lever 4, enable later) ─────
  ankle_pushoff_enabled: false
  ankle_pushoff_phase_start: 0.70
  ankle_pushoff_max_rad: 0.12

  clock_stride_period_steps: 36
  clock_phase_gate_width: 0.20

  base_ctrl_enabled: false
  fsm_enabled: false
  push_enabled: false

ppo:
  num_envs: 1024
  rollout_steps: 128
  iterations: 40

  learning_rate: 3e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.15
  entropy_coef: 0.03
  value_loss_coef: 0.5
  epochs: 2
  num_minibatches: 32
  max_grad_norm: 0.5
  target_kl: 0.02
  kl_early_stop_multiplier: 1.5
  kl_lr_backoff_multiplier: 3.0
  kl_lr_backoff_factor: 0.5
  lr_schedule_end_factor: 0.5
  entropy_schedule_end_factor: 0.4
  critic_privileged_enabled: false
  log_interval: 10

  eval:
    enabled: true
    interval: 10
    num_envs: 128
    num_steps: 500
    deterministic: true

  rollback:
    enabled: false
    patience: 2
    success_rate_drop_threshold: 0.05
    lr_factor: 0.5

amp:
  enabled: false
  dataset_path: null
  weight: 0.0

networks:
  actor:
    hidden_sizes: [256, 256, 128]
    activation: elu
    log_std_init: -1.0
    min_log_std: -5.0
    max_log_std: 2.0
  critic:
    hidden_sizes: [256, 256, 128]
    activation: elu
  discriminator:
    hidden_sizes: [512, 256]
    activation: relu

reward_weights:
  alive: 0.25
  tracking_lin_vel: 6.0
  lateral_velocity: -0.25
  base_height: 0.03
  orientation: -0.8
  angular_velocity: -0.05
  pitch_rate: -0.25
  height_target: 0.05
  height_target_sigma: 0.05
  collapse_height: -0.3
  collapse_vz: -0.2
  torque: -0.0007
  saturation: -0.05
  action_rate: -0.005
  joint_velocity: -0.0003
  slip: -0.05
  clearance: 0.0
  forward_velocity_scale: 6.0
  velocity_step_gate: 0.0
  velocity_standing_penalty: 0.6
  velocity_standing_threshold: 0.10
  velocity_cmd_min: 0.08

  # Propulsion rewards (enabled from iter 0)
  dense_progress: 1.0
  step_progress: 0.30
  foot_place: 0.10
  step_event: 0.02

  # M3 reference-following
  m3_pelvis_orientation_tracking: 0.20
  m3_pelvis_height_tracking: 0.15
  m3_swing_foot_tracking: 1.0
  m3_foothold_consistency: 0.75
  m3_residual_magnitude: -0.05
  m3_excessive_impact: -0.03
  m3_pelvis_orientation_sigma: 0.20
  m3_pelvis_height_sigma: 0.04
  m3_swing_pos_sigma: 0.05
  m3_swing_vel_sigma: 0.80
  m3_foothold_sigma: 0.07
  m3_impact_force_threshold: 40.0
  m3_impact_force_sigma: 20.0

  # Disabled terms
  step_length: 0.0
  cycle_progress: 0.0
  posture: 0.0
  com_velocity_damping: 0.0
  arrest_pitch_rate: 0.0
  arrest_capture_error: 0.0
  post_touchdown_survival: 0.0

reward:
  task_weight: 1.0
  amp_weight: 0.0
  task_reward_clip: null
  amp_reward_clip: [0.0, 1.0]

checkpoints:
  dir: training/checkpoints
  interval: 10

wandb:
  enabled: true
  project: wildrobot-ppo
  mode: offline
  tags: [ppo, walking, v0.19.4c, wr_obs_v4, residual_q_ref, support_gate_fix]

video:
  enabled: true
  episode_length: 500
  width: 640
  height: 480
  fps: 25

quick_verify:
  enabled: false
  ppo:
    num_envs: 4
    rollout_steps: 8
    iterations: 3
  amp:
    enabled: false
