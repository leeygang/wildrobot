# =============================================================================
# WildRobot v0.20.1 PPO Smoke 8b — Track A + B: TB-aligned reward family
# =============================================================================
# Goal: faithful TB walk.gin clone (action path + PPO + rewards), scaled
# to WR's body.  See smoke8a for "Track A only" (TB hyperparams + WR's
# imitation rewards retained).
#
# Audit-driven revision (CHANGELOG [v0.20.1-smoke8b-audit-fixes]):
#
# Earlier draft of smoke8b had four substantive misalignments flagged
# in code review.  This revision corrects all four:
#
# 1. cmd_forward_velocity_alpha: 0.001 → 1000.  TB and WR both use the
#    SAME formula `exp(-sigma * err²)` (multiplicative); my earlier
#    "TB sigma=1000 means exp(-err²/1000)" was wrong.  TB's sigma=1000
#    is TIGHT tracking, not loose.  TB-equivalent alpha = 1000.  See
#    `toddlerbot/locomotion/mjx_env.py:2346` and
#    `training/envs/wildrobot_env.py:1014`.
#
# 2. penalty_pose: kept active at -0.5, but env.loc_ref_penalty_pose_anchor
#    is now "home" (vs default "q_ref").  WR's penalty_pose was secretly
#    a joint-imitation penalty even when ref_q_track was disabled,
#    because q_err = q_actual - q_ref(t).  TB's penalty_pose
#    (mjx_env.py:2700-2703) anchors to default_motor_pos = constant
#    home pose.  Smoke8b now matches TB exactly via the new env flag.
#
# 3. feet_distance: → 0 (DISABLED).  WR's feet_distance is a positive
#    smooth band reward over [min_y, max_y] (env line 1063).  TB's
#    penalty_close_feet_xy (mjx_env.py:2710) is a binary -1.0 penalty
#    when lateral foot distance < threshold, with NO upper-bound term.
#    Different reward shape entirely.  Disabled in smoke8b until WR
#    implements a true penalty_close_feet_xy term (see TODO in
#    CHANGELOG; smoke9 candidate).
#
# 4. ref_feet_z_track: → 0 (DISABLED).  WR's ref_feet_z_track tracks
#    the ZMP-prior foot-z trajectory (env line 1125-1136) — still
#    reference-imitation.  TB's feet_phase (walk_env.py:631) computes
#    expected foot height from cycle phase, gates on command magnitude,
#    and is NOT an imitation reward.  Disabled in smoke8b until WR
#    implements a phase-derived feet_phase (see TODO in CHANGELOG).
#
# Net effect: smoke8b's active reward set drops from 9 to 5 terms.
# This is intentionally minimal — only terms with a faithful TB
# equivalent already implemented in WR's env.  The smoke result will
# tell us whether 5 reward signals + the obs-side phase clock are
# enough for PPO to learn walking from random init within the smoke
# compute budget.  If not, the next iteration adds true feet_phase
# and penalty_close_feet_xy implementations (smoke9).
#
# What's still in vs out (vs TB walk.gin:110-131 active block):
#
#   TB walk.gin term                  | smoke8b
#   ----------------------------------+----------------------------------
#   alive = 1.0                       | alive: 1.0                 ✓
#   lin_vel_xy = 2.0 (sigma=1000)     | cmd_forward_velocity_track: 2.0
#                                     |   alpha: 1000              ✓
#   torso_quat = 2.5                  | ref_body_quat_track: 2.5
#                                     |   (target IS identity quat,
#                                     |    geodesic angle, alpha=20
#                                     |    matches TB rot_tracking_sigma)
#   penalty_ang_vel_xy = 1.0          | ang_vel_xy: 1.0            ✓
#   penalty_action_rate = 2.0         | action_rate: -2.0          ✓
#   penalty_pose = 0.5 + per-joint    | penalty_pose: -0.5
#     weights, anchored to default    |   anchor: home (TB-aligned) ✓
#   penalty_feet_ori = 5.0            | penalty_feet_ori: -5.0     ✓
#   ang_vel_z = 1.5 (sigma=4)         | (no WR equivalent — yaw
#                                     |  cmd-tracking deferred; WR
#                                     |  doesn't sample yaw cmds)
#   penalty_close_feet_xy = 10.0      | DISABLED — needs new env reward
#                                     |  (WR feet_distance is shape-wrong)
#   feet_phase = 7.5 (swing_height,   | DISABLED — needs new env reward
#     sigma=0.0007)                   |  (WR ref_feet_z_track is
#                                     |   ZMP-imitation, not phase-derived)
#
# Reward terms ALWAYS DISABLED in smoke8b (no TB equivalent in active
# walk.gin block):
#   ref_q_track, ref_contact_match, torso_pos_xy, lin_vel_z,
#   feet_air_time, feet_clearance, torso_pitch_soft, torso_roll_soft,
#   torque, joint_velocity, slip, pitch_rate
#
# Compute budget: same as smoke8a (4096 × 20 × 240 = 19.66M).
#
# Usage:
#   uv run python training/train.py \
#     --config training/configs/ppo_walking_v0201_smoke8b.yaml --verify
#
# See also:
#   - training/CHANGELOG.md [v0.20.1-smoke8b-audit-fixes] (this revision)
#   - training/CHANGELOG.md [v0.20.1-smoke8ab-tb-alignment-audit] (origin)
#   - toddlerbot/locomotion/walk.gin:110-131 (TB active reward block)
#   - toddlerbot/locomotion/mjx_env.py:2346 (TB lin_vel_xy reward)
#   - toddlerbot/locomotion/mjx_env.py:2696 (TB penalty_pose, home-anchored)
#   - toddlerbot/locomotion/mjx_env.py:2710 (TB penalty_close_feet_xy)
#   - toddlerbot/locomotion/walk_env.py:631 (TB feet_phase)
# =============================================================================
version: "0.20.1"
version_name: "v0.20.1 PPO smoke8b (TB hyperparams + TB-pure rewards, vx=0.20)"

seed: 42

# =============================================================================
# Environment — same as smoke8a + penalty_pose anchor=home (TB-aligned)
# =============================================================================
env:
  assets_root: assets/v2
  scene_xml_path: assets/v2/scene_flat_terrain.xml
  robot_config_path: assets/v2/mujoco_robot_config.json

  sim_dt: 0.002
  ctrl_dt: 0.02

  max_episode_steps: 500

  target_height: 0.45
  min_height: 0.30
  max_height: 0.70
  max_pitch: 0.8
  max_roll: 0.8
  use_relaxed_termination: true
  torso_pitch_soft_min_rad: -0.2
  torso_pitch_soft_max_rad: 0.2
  torso_roll_soft_min_rad: -0.1
  torso_roll_soft_max_rad: 0.1
  # Held at WR defaults — feet_distance is DISABLED in smoke8b so the
  # band thresholds don't matter.  Re-tightening to TB's
  # close_feet_threshold = 0.06 will happen when WR implements a true
  # penalty_close_feet_xy term (smoke9 candidate).
  min_feet_y_dist: 0.07
  max_feet_y_dist: 0.13

  # Per-joint pose weights — these are CONSUMED by penalty_pose.
  # Weights match TB walk.gin:120-124 pattern.
  penalty_pose_weight_default: 0.0
  penalty_pose_weights_per_joint:
    left_hip_pitch: 0.01
    right_hip_pitch: 0.01
    left_hip_roll: 1.0
    right_hip_roll: 1.0
    left_knee_pitch: 0.01
    right_knee_pitch: 0.01
    left_ankle_pitch: 5.0
    right_ankle_pitch: 5.0
    left_ankle_roll: 5.0
    right_ankle_roll: 5.0

  min_velocity: 0.0
  max_velocity: 0.30
  cmd_resample_steps: 150
  cmd_zero_chance: 0.2
  cmd_turn_chance: 0.0
  cmd_deadzone: 0.05
  eval_velocity_cmd: 0.20

  contact_threshold_force: 1.0
  foot_switch_threshold: 2.0

  action_filter_alpha: 0.0

  loc_ref_version: v3_offline_library
  actor_obs_layout_id: wr_obs_v6_offline_ref_history
  loc_ref_offline_command_vx: 0.20

  # smoke8 architecture: home-pose residual base
  loc_ref_residual_base: home

  # smoke8b: penalty_pose anchors to home (TB-aligned), NOT q_ref(t).
  # Without this, penalty_pose would be a hidden joint-imitation penalty
  # even with ref_q_track=0.  See TB mjx_env.py:2700-2703.
  loc_ref_penalty_pose_anchor: home

  loc_ref_residual_mode: absolute
  loc_ref_residual_scale: 0.20
  loc_ref_residual_scale_per_joint:
    left_hip_pitch: 0.25
    right_hip_pitch: 0.25
    left_hip_roll: 0.25
    right_hip_roll: 0.25
    left_knee_pitch: 0.25
    right_knee_pitch: 0.25
    left_ankle_pitch: 0.25
    right_ankle_pitch: 0.25
    left_ankle_roll: 0.25
    right_ankle_roll: 0.25

  push_enabled: false
  imu_gyro_noise_std: 0.05
  imu_quat_noise_deg: 2.0
  imu_latency_steps: 0
  domain_randomization_enabled: true
  domain_rand_friction_range: [0.4, 1.0]
  domain_rand_mass_scale_range: [0.9, 1.1]
  domain_rand_kp_scale_range: [0.9, 1.1]
  domain_rand_frictionloss_scale_range: [0.8, 1.2]
  domain_rand_joint_offset_rad: 0.03
  domain_rand_backlash_range: [0.02, 0.10]
  domain_rand_backlash_activation: 0.1

  action_delay_steps: 1

# =============================================================================
# PPO — same Track A hyperparams as smoke8a (TB-aligned)
# =============================================================================
ppo:
  num_envs: 4096
  rollout_steps: 20
  iterations: 240

  learning_rate: 3.0e-5
  gamma: 0.97
  gae_lambda: 0.95

  clip_epsilon: 0.2
  entropy_coef: 5.0e-4
  value_loss_coef: 0.5

  epochs: 4
  num_minibatches: 16
  max_grad_norm: 1.0

  log_interval: 10
  critic_privileged_enabled: true

  eval:
    enabled: true
    interval: 10
    num_envs: 64
    num_steps: 500
    deterministic: true
    seed_offset: 10000

# =============================================================================
# Networks — same as smoke8a (TB-aligned)
# =============================================================================
networks:
  actor:
    hidden_sizes: [512, 256, 128]
    activation: elu
    log_std_init: -0.693
    min_log_std: -5.0
    max_log_std: 2.0
  critic:
    hidden_sizes: [512, 256, 128]
    activation: elu

# =============================================================================
# Reward Weights — TB walk.gin:110-131 mapping (Track B, audit-corrected)
# =============================================================================
# 5 active terms with faithful TB equivalents already implemented in WR.
# Two TB terms (penalty_close_feet_xy, feet_phase) deferred to smoke9
# pending env reward-function additions.  See header for full mapping.
reward_weights:
  # ---- TB active task + posture rewards (5 implemented) ----
  alive: 1.0
  cmd_forward_velocity_track: 2.0
  # TB lin_vel_tracking_sigma = 1000.  TB and WR formulas are both
  # exp(-sigma * err²) — multiplicative.  TB-equivalent alpha = 1000.
  cmd_forward_velocity_alpha: 1000.0
  # TB torso_quat = 2.5 (yaw-stationary identity target; WR's
  # ref_body_quat_track measures geodesic angle vs identity)
  ref_body_quat_track: 2.5
  # WR ref_body_quat_alpha defaults to 20.0 = TB rot_tracking_sigma ✓
  # TB penalty_ang_vel_xy = 1.0
  ang_vel_xy: 1.0
  # TB penalty_action_rate = 2.0 (sign convention diff)
  action_rate: -2.0
  # TB penalty_pose = 0.5 with per-joint weights (in env section above).
  # env.loc_ref_penalty_pose_anchor: home above ⟹ TB-aligned anchor.
  penalty_pose: -0.5
  # TB penalty_feet_ori = 5.0 (anti-tippy-toe via projected gravity)
  penalty_feet_ori: -5.0

  # ---- TB rewards NOT implemented in WR — disabled with TODO ----
  # TB penalty_close_feet_xy = 10.0 needs a binary -1.0 penalty when
  # lateral foot distance < close_feet_threshold (mjx_env.py:2710).
  # WR's feet_distance is a positive smooth band reward over
  # [min_y, max_y] (wildrobot_env.py:1063) — different shape entirely.
  # Disabled here; implement a true penalty_close_feet_xy in smoke9.
  feet_distance: 0.0
  # TB feet_phase = 7.5 needs phase-derived expected foot height
  # (walk_env.py:631).  WR's ref_feet_z_track tracks the ZMP-prior
  # foot-z trajectory (wildrobot_env.py:1125-1136) — still
  # imitation-reference, not phase-derived.  Disabled here; implement
  # phase-derived feet_phase in smoke9.
  ref_feet_z_track: 0.0
  ref_feet_z_track_alpha: 1428.6  # held at smoke7 default; weight=0 disables term

  # ---- Imitation rewards: explicitly DISABLED (TB doesn't use them) ----
  ref_q_track: 0.0
  ref_contact_match: 0.0
  torso_pos_xy: 0.0
  torso_pos_xy_alpha: 90.0  # held at smoke7 default; weight=0 disables term

  # ---- Stab / shaping rewards TB doesn't have in active block ----
  lin_vel_z: 0.0
  feet_air_time: 0.0
  feet_clearance: 0.0
  torso_pitch_soft: 0.0
  torso_roll_soft: 0.0
  torque: 0.0
  joint_velocity: 0.0
  slip: 0.0
  pitch_rate: 0.0

reward:
  task_weight: 1.0
  task_reward_clip: null

checkpoints:
  dir: training/checkpoints
  interval: 10

wandb:
  enabled: true
  project: wildrobot-ppo
  mode: offline
  tags: [ppo, v0.20.1, smoke8b, tb_aligned_full, home_base, no_imitation]

video:
  enabled: false

quick_verify:
  enabled: false
  ppo:
    num_envs: 4
    rollout_steps: 8
    iterations: 3
    eval:
      enabled: true
      interval: 1
      num_envs: 4
      num_steps: 16
      deterministic: true
      seed_offset: 10000
