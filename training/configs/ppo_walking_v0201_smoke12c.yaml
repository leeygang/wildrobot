# =============================================================================
# WildRobot v0.20.1 PPO Smoke 12c — tighten smoke12b's widened leg-pitch
# residual authority after gait emergence
# =============================================================================
# smoke12b (offline-run-20260518_180320-ot8zazo1) finally broke the
# standing basin and produced real forward stepping, but the late run
# still failed deploy review:
#   - deterministic and stochastic visual eval both showed large lateral
#     drift over a 10 s rollout,
#   - train per-foot event metrics became strongly asymmetric,
#   - late checkpoints crossed the G5 residual knee cap while forward
#     velocity improved.
#
# smoke12c keeps smoke12b's basin-break recipe intact:
#   - forward-only cmd range  [0.08, 0.1333333333]
#   - cmd_zero_chance: 0.0
#   - action_rate: -1.0
#   - home/home basin
#   - de-hybridized actor: wr_obs_v7_phase_proprio
#   - baseline-subtract feet_phase helper with standing hard-zero
#
# and changes ONE thing:
#   - tighten the widened leg-pitch residual scales from smoke12b's
#     75%-coverage derivation toward 60%-coverage, so the policy must
#     stay closer to the prior while preserving enough authority to keep
#     stepping.
#
# Rationale:
# smoke12b's failure is no longer "cannot move" — gait has emerged.
# The current problem is that the policy buys more forward progress by
# letting one leg own more of the propulsion budget, especially on the
# knee chain.  The next highest-confidence intervention is therefore to
# keep the working basin-break curriculum and reduce residual ownership
# back toward a correction regime.
#
# Bootstrap scope note: WR command space stays forward-only with no
# yaw/turn.  Backward / lateral / yaw will be reintroduced in a
# future branch once forward gait is established.
#
# Relative to smoke11, smoke12c still carries the same smoke12/12b
# basin-break set:
#
#   (1) cmd_zero_chance: 0.2 -> 0.0
#       Every bootstrap episode now requires forward motion.  smoke9c/10/11
#       gave PPO a perfect-tracking standstill mode on 20% of episodes.
#
#   (2) reward/feet_phase formula: raw -> max(0, raw - flat_foot_baseline)
#       (global code change in training/envs/wildrobot_env.py).  smoke11
#       measured ``reward/feet_phase ≈ 0.1088`` on a near-flat-foot policy
#       because TB's raw formula pays ~0.73 for keeping feet on the ground
#       during walking phase.  smoke12 subtracts that baseline so flat-foot
#       walking pays zero and only real swing tracking pays positive.
#       Standing branch returns 0 unconditionally (irrelevant with
#       cmd_zero_chance=0 above).  See WildRobotEnv._feet_phase_reward
#       docstring for the formula and rationale; tests in
#       tests/test_v0201_env_rewards_tb.py pin the new numerics.
#
#   (3) reward/action_rate: -2.0 -> -1.0
#       Halve the action-smoothness penalty so early exploration can
#       produce stride attempts without unpenalized action thrash.
#       Defer back to -2.0 once smoke12 shows the policy is exploring
#       stride space.
#
#   (4) loc_ref_residual_scale_per_joint widened above the legacy
#       0.25 floor on the leg-pitch chain, but less aggressively than
#       smoke12b:
#         smoke12b = coverage 0.75
#         smoke12c = coverage 0.60
#
#       This keeps gait-emergence authority while reducing the late-run
#       asymmetric knee ownership seen in smoke12b.
#
# Carry-overs from smoke11 (kept byte-equal): home keyframe + basin
# flags, ``wr_obs_v7_phase_proprio`` actor layout, command range +
# deadzone (only cmd_zero_chance changes), TB-style reset perturbation,
# PPO hyperparameters, compute budget.  The deltas above are the only
# material changes.
#
# Scale factor from Phase 9D WR/TB comparison:
#   s = WR_operating_speed / TB_operating_speed = 0.20 / 0.15 = 4/3
#
# Size-normalized curriculum mapping from TB bootstrap:
#   TB range [-0.10, +0.10]     -> WR [-0.1333333333, +0.1333333333]
#   TB deadzone 0.05            -> WR  0.0666666667
#   TB eval/offline cmd +0.10   -> WR +0.1333333333
#
# To preserve the same normalized velocity-tracking reward basin:
#   TB alpha = 1000
#   WR alpha = 1000 / s^2 = 562.5
#   exp(-1000 * 0.10^2) == exp(-562.5 * 0.1333333333^2)
#
# Spatial reward changes (new in this pass):
#   feet_phase:   swing_height 0.04 -> 0.05 m, alpha 1428.6 -> 914.304.
#                 0.05 m is the WR PRIOR-ALIGNED target (matches
#                 control/zmp/zmp_walk.py:134 foot_step_height_m), NOT a
#                 strict Hof-1996 characteristic-length rescale of TB
#                 0.04 m (which would put WR closer to ~0.07-0.08 m).
#                 Alpha is rescaled by (0.04/0.05)^2 to keep the
#                 dimensionless Gaussian basin alpha * swing_height^2 =
#                 2.286 INVARIANT under the target change, so the reward
#                 shape (flat-foot baseline, peak-tracking reward) stays
#                 calibrated.  This is an explicit deviation from strict
#                 size-normalization, kept consistent with the deployed
#                 WR prior.
#   close_feet_threshold: 0.06 -> 0.146 m  (TB fraction-of-stance applied
#                 to WR stance: TB foot-body lateral spacing 0.074 m at
#                 home pose -> WR 0.18056 m at home pose; ratio 2.44x).
#   min/max_feet_y_dist:  0.07/0.13 -> 0.171/0.317 m  (same
#                 fraction-of-stance rule; ``feet_distance`` is inactive
#                 in this config but normalized now so future activation
#                 doesn't re-introduce TB-literal meters on WR).
#
# Reset perturbation (carried from smoke10/smoke9c; do NOT revert per
# tmp_next_training_interventions.md §2.3):
#   reset_torso_{roll,pitch}_range: [-0.1, 0.1] rad each.  Mirrors TB's
#   bipedal DomainRandConfig defaults (mjx_config.py:211-212) and the
#   leg-pitch partition in TB mjx_env.py:954-1053.  Perturbs only the
#   physical reset qpos (not the home ctrl base), so zero policy
#   action still composes to the constant home control target
#   (``_home_q_rad`` under loc_ref_residual_base=home).  This breaks
#   the stand-still attractor without changing the reset center: the
#   policy must take active corrective actions to return to home,
#   removing the "do nothing and survive 500 steps" basin.
#
# Scope boundary:
# - this config is the normalized bootstrap run
# - later continuation toward WR's 0.20 m/s operating point (and any
#   higher product target such as 0.26 m/s) is separate work.
# =============================================================================
version: "0.20.1"
version_name: "v0.20.1 PPO smoke12c (forward-only cmd range fix on smoke12 basin-break)"

seed: 42

# =============================================================================
# Environment — smoke11 de-hybridized actor obs over smoke10 baseline
# =============================================================================
env:
  assets_root: assets/v2
  scene_xml_path: assets/v2/scene_flat_terrain.xml
  robot_config_path: assets/v2/mujoco_robot_config.json

  sim_dt: 0.002
  ctrl_dt: 0.02

  max_episode_steps: 500

  target_height: 0.45
  min_height: 0.30
  max_height: 0.70
  max_pitch: 0.8
  max_roll: 0.8
  use_relaxed_termination: true
  torso_pitch_soft_min_rad: -0.2
  torso_pitch_soft_max_rad: 0.2
  torso_roll_soft_min_rad: -0.1
  torso_roll_soft_max_rad: 0.1
  # WR-normalized from TB literals 0.07 / 0.13 (walk.gin defaults at TB
  # stance width 0.074 m).  Fraction-of-stance preserved on WR's 0.18056 m
  # stance.  feet_distance is inactive in smoke9c (weight 0); normalized
  # now so a future activation doesn't re-introduce TB-literal meters.
  min_feet_y_dist: 0.171
  max_feet_y_dist: 0.317

  # TB-style reset-time pose perturbation on the home basin (smoke11
  # inherits this from smoke10's home/home flip; original wording from
  # smoke9c referenced the ref_init basin and is intentionally rewritten
  # here to match the current architecture).  Mirrors TB
  # ``DomainRandConfig.torso_pitch_range`` / ``torso_roll_range``
  # (toddlerbot/locomotion/mjx_config.py:211-212 bipedal defaults
  # ``[-0.1, 0.1]`` rad each) and the partitioned-leg-pitch reset logic in
  # TB ``mjx_env.py:954-1053``.  Perturbs only the initial physical qpos;
  # the home ctrl base is untouched so zero policy action still composes
  # to the same constant control target (``_home_q_rad``, zero-residual
  # invariant under ``loc_ref_residual_base=home``).
  reset_torso_roll_range: [-0.1, 0.1]
  reset_torso_pitch_range: [-0.1, 0.1]

  penalty_pose_weight_default: 0.0
  penalty_pose_weights_per_joint:
    left_hip_pitch: 0.01
    right_hip_pitch: 0.01
    left_hip_roll: 1.0
    right_hip_roll: 1.0
    left_knee_pitch: 0.01
    right_knee_pitch: 0.01
    left_ankle_pitch: 5.0
    right_ankle_pitch: 5.0
    left_ankle_roll: 5.0
    right_ankle_roll: 5.0

  # Command curriculum: forward-only bootstrap range (smoke12c fix).
  #
  # smoke9c/10/11/smoke12 inherited the WR size-normalized TB bootstrap
  # range [-0.1333, +0.1333] m/s — symmetric around zero.  smoke12
  # additionally set ``cmd_zero_chance: 0.0`` to force every episode
  # to demand nonzero motion, but the SYMMETRY around zero meant
  # ~50% of episodes still asked for backward motion.  Combined with
  # smoke12's widened residual + halved action_rate, PPO collapsed
  # into a backward-stepping gait at iter-10 onward (measured:
  # forward_velocity ≈ -0.35 m/s, step_length_event ≈ -1 mm, every
  # episode terminated on height in ~54 steps).  Iter-0 random
  # policy already showed -0.14 m/s drift, confirming the bias was
  # in the curriculum rather than env physics.
  #
  # smoke12c makes the bootstrap range strictly forward-positive so
  # the policy can only ever be rewarded for moving forward:
  #   min_velocity: 0.08          (smallest forward speed worth
  #                                bootstrapping; clears the smoke12
  #                                cmd_deadzone of 0.0667 so the
  #                                deadzone-snap branch is inert)
  #   max_velocity: 0.1333333333  (= smoke12 max + eval cmd; keeps
  #                                eval pinned to the top of the
  #                                training range)
  # Defer broader command space (yaw, lateral, backward) to a future
  # branch once forward gait is established.
  min_velocity: 0.08
  max_velocity: 0.1333333333
  cmd_resample_steps: 150
  # smoke12 basin-break: every bootstrap episode must require forward
  # motion.  smoke9c/10/11 set 0.2, which gave PPO an easy
  # "perfect-tracking standstill" mode on 20% of episodes; that
  # contributed to the smoke11 quiet-standstill basin (see
  # tmp_next_training_interventions.md status note).
  cmd_zero_chance: 0.0
  cmd_turn_chance: 0.0
  # Deadzone retained from smoke12 for back-compat with the sampler
  # path; under min_velocity=0.08 > 0.0667 the deadzone is inert
  # (no sampled cmd ever falls within the deadzone).
  cmd_deadzone: 0.0666666667
  eval_velocity_cmd: 0.1333333333

  contact_threshold_force: 1.0
  foot_switch_threshold: 2.0

  action_filter_alpha: 0.0

  loc_ref_version: v3_offline_library
  # smoke11 de-hybridization (this commit): TB-aligned actor obs
  # (phase + proprio + history); all other loc_ref_* channels leave
  # the actor pipeline and remain only in the privileged critic +
  # reward terms.  See the header for the full channel diff vs v6.
  actor_obs_layout_id: wr_obs_v7_phase_proprio
  # Offline reference command aligned with the normalized eval cmd
  # for consistent diagnostics (inherited from smoke9c via smoke10).
  loc_ref_offline_command_vx: 0.1333333333

  # Home/home basin (TB-style constant home-pose residual + reset).
  # Inherited from smoke10 (commit f7fa889); post-home-migration
  # `home` is the locomotion-ready crouched pose derived from the WR
  # walking prior (commits a015d6b / 3f9ef17).  smoke11 has TWO
  # material deltas vs smoke9c: this basin flip AND the
  # ``actor_obs_layout_id`` change above; smoke10 only had the basin
  # flip.
  loc_ref_residual_base: home
  # Reset/init: actuator qpos seeded from the home keyframe (inherited
  # from smoke10).
  loc_ref_reset_base: home
  # smoke8b: penalty_pose anchored to home (unchanged from smoke9c —
  # it already pointed at home before the basin flip).
  loc_ref_penalty_pose_anchor: home
  # smoke9 form flags: TB-faithful reward formulas
  loc_ref_penalty_ang_vel_xy_form: tb_neg_squared
  loc_ref_penalty_feet_ori_form: tb_linear_lateral
  # smoke12 basin-break (delta #4 of the bootstrap stack): hard-zero the
  # feet_phase standing branch.  Safe under this config because
  # ``cmd_zero_chance: 0.0`` makes the standing branch unreachable on
  # the smoke12 training distribution; the explicit flag keeps the
  # behavior intentional rather than incidental and lets future
  # branches (where cmd_zero_chance > 0 returns) re-enable the
  # standing payout by setting this back to false.  The walking
  # branch baseline-subtract fix is NOT gated by this flag; that is
  # the permanent smoke12 default.
  loc_ref_feet_phase_zero_on_standing: true
  # WR-normalized from TB literal 0.06 (walk.gin:125) at TB stance 0.074 m.
  # Fraction-of-stance preserved on WR's 0.18056 m stance =>
  #   threshold = 0.06 / 0.074 * 0.18056 = 0.146 m
  close_feet_threshold: 0.146

  # Hip/knee pitch scales tightened from smoke12b using
  # assets/derive_residual_scales.py at vx=0.1333333333, coverage=0.60,
  # then clamped against the legacy 0.25 floor for unchanged joints.
  # Re-run that script after regenerating the prior / home.
  loc_ref_residual_mode: absolute
  loc_ref_residual_scale: 0.2
  loc_ref_residual_scale_per_joint:
    left_hip_pitch: 0.2827
    left_hip_roll: 0.25
    left_knee_pitch: 0.5336
    left_ankle_pitch: 0.25
    left_ankle_roll: 0.25
    right_hip_pitch: 0.3094
    right_hip_roll: 0.25
    right_knee_pitch: 0.5326
    right_ankle_pitch: 0.25
    right_ankle_roll: 0.25

  push_enabled: false
  imu_gyro_noise_std: 0.05
  imu_quat_noise_deg: 2.0
  imu_latency_steps: 0
  domain_randomization_enabled: true
  domain_rand_friction_range: [0.4, 1.0]
  domain_rand_mass_scale_range: [0.9, 1.1]
  domain_rand_kp_scale_range: [0.9, 1.1]
  domain_rand_frictionloss_scale_range: [0.8, 1.2]
  domain_rand_joint_offset_rad: 0.03
  domain_rand_backlash_range: [0.02, 0.10]
  domain_rand_backlash_activation: 0.1

  action_delay_steps: 1

# =============================================================================
# PPO — same Track A hyperparams as smoke9 (TB-aligned, 12GB-safe)
# =============================================================================
ppo:
  num_envs: 2048
  rollout_steps: 20
  iterations: 480

  learning_rate: 3.0e-5
  gamma: 0.97
  gae_lambda: 0.95

  clip_epsilon: 0.2
  entropy_coef: 5.0e-4
  value_loss_coef: 0.5

  epochs: 4
  num_minibatches: 16
  max_grad_norm: 1.0

  log_interval: 10
  critic_privileged_enabled: true

  eval:
    enabled: false
    interval: 10
    num_envs: 64
    num_steps: 500
    deterministic: true
    seed_offset: 10000
    post_training_enabled: true
    post_training_top_k: 3
    post_training_num_envs: 8
    post_training_num_steps: 500
    post_training_checkpoint_label: eval_promoted

# =============================================================================
# Networks — same as smoke9 (TB-aligned)
# =============================================================================
networks:
  actor:
    hidden_sizes: [512, 256, 128]
    activation: elu
    log_std_init: -0.693
    min_log_std: -5.0
    max_log_std: 2.0
  critic:
    hidden_sizes: [512, 256, 128]
    activation: elu

# =============================================================================
# Reward Weights — same as smoke9 (full TB walk.gin:110-131 active block)
# =============================================================================
reward_weights:
  # ---- TB active reward block (8 implemented) ----
  alive: 1.0
  cmd_forward_velocity_track: 2.0
  # Preserve the same normalized tracking basin after scaling cmd by s=4/3:
  # alpha_wr = alpha_tb / s^2 = 1000 / (4/3)^2 = 562.5
  # so exp(-alpha_tb * 0.10^2) == exp(-alpha_wr * 0.1333333333^2).
  cmd_forward_velocity_alpha: 562.5
  ref_body_quat_track: 2.5
  ang_vel_xy: 1.0
  # smoke12 basin-break: halve the action-rate penalty for bootstrap.
  # smoke11 used -2.0 (matches TB walk.gin:119 penalty_action_rate=2.0
  # in magnitude); the empirical late-run reward/action_rate ≈ -0.014
  # combined with the flat-foot feet_phase exploit pulled PPO toward
  # "do less" rather than "lift feet".  -1.0 weakens that pressure
  # enough to let early exploration produce stride attempts without
  # an unpenalized action thrash.  Defer back to -2.0 once smoke12
  # shows the policy is exploring stride space at all.
  action_rate: -1.0
  penalty_pose: -0.5
  penalty_close_feet_xy: 10.0
  feet_phase: 7.5
  # feet_phase swing target = 0.05 m, set from the WR-validated ZMP
  # prior (control/zmp/zmp_walk.py:134 foot_step_height_m), NOT from a
  # strict body-size rescale of TB 0.04 m.  This is an explicit
  # deviation from Hof-1996 characteristic-length normalization; see
  # the smoke9c header for the rationale.  Alpha is rescaled by
  # (0.04/0.05)^2 to preserve the dimensionless Gaussian basin
  # ``alpha * swing_height^2 = 2.286`` so the reward shape stays
  # calibrated (flat-foot baseline and peak-tracking reward unchanged):
  #   alpha_wr = 1428.6 * (0.04 / 0.05)^2 = 914.304
  feet_phase_alpha: 914.304
  feet_phase_swing_height: 0.05
  penalty_feet_ori: 5.0

  # ---- Imitation rewards: explicitly DISABLED (TB doesn't use them) ----
  ref_q_track: 0.0
  ref_contact_match: 0.0
  ref_feet_z_track: 0.0
  ref_feet_z_track_alpha: 1428.6  # held at default; weight=0 disables term
  torso_pos_xy: 0.0
  torso_pos_xy_alpha: 90.0  # held at default; weight=0 disables term

  # ---- Stab / shaping rewards TB doesn't have in active block ----
  lin_vel_z: 0.0
  feet_air_time: 0.0
  feet_clearance: 0.0
  feet_distance: 0.0
  torso_pitch_soft: 0.0
  torso_roll_soft: 0.0
  torque: 0.0
  joint_velocity: 0.0
  slip: 0.0
  pitch_rate: 0.0

reward:
  task_weight: 1.0
  task_reward_clip: null

checkpoints:
  dir: training/checkpoints
  interval: 10

wandb:
  enabled: true
  project: wildrobot-ppo
  mode: offline
  tags: [ppo, v0.20.1, smoke12c, basin_break_bootstrap, forward_only_cmd_range, cmd_zero_chance_0, feet_phase_baseline_subtract, action_rate_halved, tb_home_basin, de_hybridized_actor, wr_obs_v7_phase_proprio, widen_residual_scale_per_joint, prior_coverage_0p75, reset_perturb_tb]

video:
  enabled: false

quick_verify:
  enabled: false
  ppo:
    num_envs: 4
    rollout_steps: 8
    iterations: 3
    eval:
      enabled: true
      interval: 1
      num_envs: 4
      num_steps: 16
      deterministic: true
      seed_offset: 10000
